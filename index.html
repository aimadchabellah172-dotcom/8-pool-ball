<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>8 Ball Pool - Professional Aim System</title>
    <style>
        body { margin: 0; background: #0b0f1a; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #wrapper { position: relative; border: 12px solid #3d2416; border-radius: 20px; box-shadow: 0 0 100px #000; }
        canvas { background: #1e4b8a; display: block; cursor: crosshair; }
    </style>
</head>
<body>

<div id="wrapper">
    <canvas id="poolCanvas"></canvas>
</div>

<script>
const canvas = document.getElementById('poolCanvas');
const ctx = canvas.getContext('2d');

canvas.width = 940;
canvas.height = 470;

const BALL_R = 12.5;
const CUSHION = 22;

let balls = [];
let cueBall;
let mouse = { x: 0, y: 0 };
let isDragging = false;
let power = 0;
let shotAngle = 0;

const colors = ["#fff", "#facc15", "#1d4ed8", "#dc2626", "#7c3aed", "#ea580c", "#16a34a", "#7f1d1d", "#111", "#fde047", "#60a5fa", "#fca5a5", "#c084fc", "#fdba74", "#86efac", "#991b1b"];

class Ball {
    constructor(x, y, num, color) {
        this.x = x; this.y = y; this.num = num; this.color = color;
        this.vx = 0; this.vy = 0; this.inPocket = false;
    }
    draw() {
        if (this.inPocket) return;
        ctx.save();
        // تدرج الكرة 3D
        let g = ctx.createRadialGradient(this.x-4, this.y-4, 2, this.x, this.y, BALL_R);
        g.addColorStop(0, "#fff"); g.addColorStop(0.4, this.color); g.addColorStop(1, "#000");
        ctx.beginPath(); ctx.arc(this.x, this.y, BALL_R, 0, Math.PI*2);
        ctx.fillStyle = g; ctx.fill();
        // الرقم
        if (this.num > 0) {
            ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(this.x, this.y, BALL_R/1.8, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "black"; ctx.font = "bold 10px Arial"; ctx.textAlign="center"; ctx.fillText(this.num, this.x, this.y+4);
        }
        ctx.restore();
    }
    update() {
        if (this.inPocket) return;
        this.x += this.vx; this.y += this.vy;
        this.vx *= 0.985; this.vy *= 0.985;
        if (Math.hypot(this.vx, this.vy) < 0.1) { this.vx = 0; this.vy = 0; }
        
        // ارتداد الحواف
        if (this.x < CUSHION || this.x > canvas.width - CUSHION) {
            if (this.y > 50 && this.y < 420) { this.vx *= -0.8; this.x = this.x < CUSHION ? CUSHION : canvas.width - CUSHION; }
        }
        if (this.y < CUSHION || this.y > canvas.height - CUSHION) {
            if ((this.x > 50 && this.x < 450) || (this.x > 490 && this.x < 890)) { this.vy *= -0.8; this.y = this.y < CUSHION ? CUSHION : canvas.height - CUSHION; }
        }

        // الحفر
        [[0,0], [470,0], [940,0], [0,470], [470,470], [940,470]].forEach(p => {
            if (Math.hypot(this.x - p[0], this.y - p[1]) < 35) this.inPocket = true;
        });
    }
}

function init() {
    balls = [];
    cueBall = new Ball(250, 235, 0, colors[0]);
    balls.push(cueBall);
    let n=1;
    for(let i=0; i<5; i++) {
        for(let j=0; j<=i; j++) {
            balls.push(new Ball(650 + i*23, 235 - (i*11.5) + j*24, n, colors[n]));
            n++;
        }
    }
}

function drawAiming() {
    if (cueBall.vx !== 0 || cueBall.vy !== 0) return;

    shotAngle = Math.atan2(mouse.y - cueBall.y, mouse.x - cueBall.x);
    
    // البحث عن أول كرة يصطدم بها المسار
    let closestDist = 1000;
    let targetBall = null;

    balls.forEach(b => {
        if (b === cueBall || b.inPocket) return;
        
        // حساب التقاطع الرياضي بين شعاع ودائرة
        let dx = b.x - cueBall.x;
        let dy = b.y - cueBall.y;
        let distToBall = Math.hypot(dx, dy);
        let projection = dx * Math.cos(shotAngle) + dy * Math.sin(shotAngle);

        if (projection > 0) {
            let offTarget = Math.sqrt(distToBall**2 - projection**2);
            if (offTarget < BALL_R * 2) {
                let hitDist = projection - Math.sqrt((BALL_R*2)**2 - offTarget**2);
                if (hitDist < closestDist) {
                    closestDist = hitDist;
                    targetBall = b;
                }
            }
        }
    });

    let endX = cueBall.x + Math.cos(shotAngle) * closestDist;
    let endY = cueBall.y + Math.sin(shotAngle) * closestDist;

    // 1. الخط الرئيسي (متصل)
    ctx.strokeStyle = "rgba(255, 255, 255, 0.8)";
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(cueBall.x, cueBall.y); ctx.lineTo(endX, endY); ctx.stroke();

    // 2. دائرة الهدف (Ghost Ball)
    ctx.beginPath(); ctx.arc(endX, endY, BALL_R, 0, Math.PI*2);
    ctx.strokeStyle = "white"; ctx.stroke();

    if (targetBall) {
        // 3. مسار الكرة المضروبة (Target Ball Path)
        let impactAngle = Math.atan2(targetBall.y - endY, targetBall.x - endX);
        ctx.strokeStyle = "#fff";
        ctx.beginPath();
        ctx.moveTo(targetBall.x, targetBall.y);
        ctx.lineTo(targetBall.x + Math.cos(impactAngle) * 100, targetBall.y + Math.sin(impactAngle) * 100);
        ctx.stroke();

        // 4. مسار ارتداد الكرة البيضاء (Tangent Line)
        let tangentAngle = impactAngle + Math.PI/2;
        ctx.strokeStyle = "rgba(255,255,255,0.4)";
        ctx.beginPath();
        ctx.moveTo(endX, endY);
        ctx.lineTo(endX + Math.cos(tangentAngle) * 60, endY + Math.sin(tangentAngle) * 60);
        ctx.stroke();
    }

    // 5. رسم العصا
    let stickDist = isDragging ? power * 2 + 20 : 20;
    ctx.save();
    ctx.translate(cueBall.x, cueBall.y);
    ctx.rotate(shotAngle + Math.PI);
    let stickG = ctx.createLinearGradient(-stickDist, 0, -stickDist-380, 0);
    stickG.addColorStop(0, "#fde047"); stickG.addColorStop(0.1, "#452512"); stickG.addColorStop(1, "#000");
    ctx.fillStyle = stickG;
    ctx.beginPath(); ctx.roundRect(-stickDist, -4, -380, 8, 4); ctx.fill();
    ctx.restore();
}

canvas.onmousedown = () => { if(cueBall.vx===0) isDragging = true; };
window.onmousemove = (e) => {
    const rect = canvas.getBoundingClientRect();
    mouse = { x: e.clientX - rect.left, y: e.clientY - rect.top };
    if(isDragging) power = Math.min(Math.hypot(mouse.x - cueBall.x, mouse.y - cueBall.y)/5, 40);
};
window.onmouseup = () => {
    if(isDragging) {
        cueBall.vx = Math.cos(shotAngle) * power;
        cueBall.vy = Math.sin(shotAngle) * power;
        isDragging = false; power = 0;
    }
};

function loop() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    // رسم الطاولة
    ctx.fillStyle = "#1e4b8a"; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "#163a6e";
    ctx.fillRect(45,0,385,CUSHION); ctx.fillRect(510,0,385,CUSHION);
    ctx.fillRect(45,448,385,CUSHION); ctx.fillRect(510,448,385,CUSHION);
    ctx.fillRect(0,45,CUSHION,380); ctx.fillRect(918,45,CUSHION,380);
    ctx.fillStyle = "#000";
    [[0,0], [470,0], [940,0], [0,470], [470,470], [940,470]].forEach(p => {
        ctx.beginPath(); ctx.arc(p[0], p[1], 35, 0, Math.PI*2); ctx.fill();
    });

    balls.forEach(b => { b.update(); b.draw(); });
    
    // تصادم الكرات
    for(let i=0; i<balls.length; i++) {
        for(let j=i+1; j<balls.length; j++) {
            let b1=balls[i], b2=balls[j];
            if(b1.inPocket || b2.inPocket) continue;
            let d = Math.hypot(b2.x-b1.x, b2.y-b1.y);
            if(d < BALL_R*2) {
                let a = Math.atan2(b2.y-b1.y, b2.x-b1.x);
                let overlap = BALL_R*2 - d;
                b1.x -= Math.cos(a)*overlap/2; b1.y -= Math.sin(a)*overlap/2;
                b2.x += Math.cos(a)*overlap/2; b2.y += Math.sin(a)*overlap/2;
                let v1n = b1.vx*Math.cos(a) + b1.vy*Math.sin(a);
                let v2n = b2.vx*Math.cos(a) + b2.vy*Math.sin(a);
                b1.vx += (v2n-v1n)*Math.cos(a); b1.vy += (v2n-v1n)*Math.sin(a);
                b2.vx += (v1n-v2n)*Math.cos(a); b2.vy += (v1n-v2n)*Math.sin(a);
            }
        }
    }
    drawAiming();
    requestAnimationFrame(loop);
}

init(); loop();
</script>
</body>
</html>
