<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحميل فيديوهات يوتيوب باختيار الجودة الفائقة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0b0c10;
            --card-bg: rgba(21, 23, 30, 0.8);
            --accent-color: #00f2fe;
            --accent-gradient: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            --text-main: #f5f6fa;
            --text-secondary: #9aa0a6;
            --border-color: rgba(255, 255, 255, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            background-image: 
                radial-gradient(at 10% 20%, rgba(0, 242, 254, 0.05) 0px, transparent 50%),
                radial-gradient(at 90% 80%, rgba(79, 70, 229, 0.05) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .main-card {
            width: 100%;
            max-width: 700px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        .logo-area h1 {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-area p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 35px;
        }

        /* حقل إدخال الرابط */
        .search-box {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        input[type="text"] {
            width: 100%;
            background: #161922;
            border: 2px solid var(--border-color);
            padding: 18px 24px;
            border-radius: 16px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            text-align: left;
        }

        input[type="text"]:focus {
            border-color: #4facfe;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.15);
        }

        .fetch-btn {
            width: 100%;
            background: var(--accent-gradient);
            color: #0b0c10;
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.2);
        }

        .fetch-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 242, 254, 0.35);
        }

        /* صندوق استعراض الجودات المتاحة */
        .downloader-panel {
            margin-top: 20px;
            border-top: 1px solid var(--border-color);
            padding-top: 30px;
            display: none; /* يظهر فقط عند جلب الرابط */
        }

        .panel-title {
            font-size: 0.95rem;
            color: #00f2fe;
            margin-bottom: 15px;
            font-weight: 700;
        }

        /* نافذة معالجة الجودات */
        .iframe-container {
            width: 100%;
            height: 380px;
            background: #161922;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .info-footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="logo-area">
            <h1>مُحمّل يوتيوب الخارق</h1>
            <p>اختر الجودة المفضلة لديك (MP4 لـ 1080p أو MP3 للصوت) وحمل مباشرة</p>
        </div>

        <div class="search-box">
            <div class="input-wrapper">
                <input type="text" id="youtubeUrl" placeholder="أدخل أو الصق رابط فيديو يوتيوب هنا..." autocomplete="off">
            </div>
            <button class="fetch-btn" onclick="fetchVideoQualities()">⚡ جلب خيارات الجودة المتاحة</button>
        </div>

        <div class="downloader-panel" id="downloaderPanel">
            <div class="panel-title">👇 اختر الجودة ونوع الملف للتحميل المباشر:</div>
            <div class="iframe-container">
                <iframe id="conversionEngine" src=""></iframe>
            </div>
        </div>

        <div class="info-footer">
            * هذا الموقع مدمج مع محرك معالجة سحابي فوري لمنحك أعلى دقة تحميل متوفرة للفيديو.
        </div>
    </div>

    <script>
        function fetchVideoQualities() {
            const urlInput = document.getElementById('youtubeUrl').value.trim();
            const downloaderPanel = document.getElementById('downloaderPanel');
            const conversionEngine = document.getElementById('conversionEngine');

            if (!urlInput) {
                alert('الرجاء وضع رابط فيديو يوتيوب أولاً!');
                return;
            }

            // استخراج الـ ID الخاص بالفيديو لدعم محرك الجودات الاختيارية
            let videoId = "";
            try {
                if (urlInput.includes('v=')) {
                    videoId = urlInput.split('v=')[1].split('&')[0];
                } else if (urlInput.includes('youtu.be/')) {
                    videoId = urlInput.split('youtu.be/')[1].split('?')[0];
                } else if (urlInput.includes('embed/')) {
                    videoId = urlInput.split('embed/')[1].split('?')[0];
                }
            } catch (err) {
                alert('فشل استخراج معرف الفيديو، يرجى التحقق من صحة الرابط.');
                return;
            }

            if (!videoId) {
                alert('رابط يوتيوب غير مدعوم أو غير صحيح، يرجى تجربة رابط آخر.');
                return;
            }

            // إظهار لوحة التحميل
            downloaderPanel.style.display = 'block';

            // ربط الواجهة بمحرك الـ API الاحترافي الخارجي الذي يقوم بفحص خوادم يوتيوب
            // وتوليد جدول كامل يحتوي على جودات اختيارية (1080p, 720p, 480p, 320p, MP3)
            const gatewayUrl = `https://twoshot-api-gate.vercel.app/api/widget/button/${videoId}`;
            
            // شحن المحرك بالرابط لبدء إظهار أزرار الجودات
            conversionEngine.src = gatewayUrl;
        }
    </script>
</body>
</html>
