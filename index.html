<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Billiards Master Pro - High Graphics</title>
    <style>
        body { 
            background: #0a0e14; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; color: white; font-family: 'Segoe UI', Arial; overflow: hidden; 
        }
        
        #gameWrapper { position: relative; padding: 25px; background: #1a1a1a; border-radius: 15px; box-shadow: 0 0 100px rgba(0,0,0,0.9); }

        /* واجهة المستخدم العلوية */
        #topHUD {
            display: flex; justify-content: space-between; align-items: center;
            width: 900px; margin-bottom: 15px;
        }
        .player { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 45px; height: 45px; border-radius: 8px; border: 2px solid #ffd700; background: #333; }
        .score-box { background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 20px; font-weight: bold; color: #ffd700; }

        /* الطاولة والجرافيكس */
        canvas { 
            border: 18px solid #5d2906; /* إطار خشبي داكن */
            border-radius: 12px;
            cursor: none; /* سنرسم مؤشر مخصص أو نكتفي بالعصا */
        }

        #powerContainer {
            position: absolute; right: -60px; top: 100px;
            width: 30px; height: 250px; background: #222; border: 2px solid #444; border-radius: 5px;
        }
        #powerBar { width: 100%; background: linear-gradient(to top, #ff0000, #ffff00, #00ff00); position: absolute; bottom: 0; transition: height 0.1s; }
    </style>
</head>
<body>

    <div id="topHUD">
        <div class="player">
            <div class="avatar" style="background: linear-gradient(45deg, #2e7d32, #1b5e20);"></div>
            <div><strong>SUSAN</strong><br><span style="font-size: 12px; color: #aaa;">Level 43</span></div>
        </div>
        <div class="score-box">MATCH 🪙 100</div>
        <div class="player">
            <div style="text-align: right;"><strong>BRIAN</strong><br><span style="font-size: 12px; color: #aaa;">Level 78</span></div>
            <div class="avatar" style="background: linear-gradient(45deg, #d32f2f, #b71c1c);"></div>
        </div>
    </div>

    <div id="gameWrapper">
        <canvas id="poolCanvas" width="900" height="450"></canvas>
        <div id="powerContainer"><div id="powerBar" style="height: 0%"></div></div>
    </div>

<script>
const canvas = document.getElementById('poolCanvas');
const ctx = canvas.getContext('2d');

const BALL_R = 13.5;
const POCKET_R = 26;
const FRICTION = 0.988;
const COLORS = ["#FFFFFF", "#FDD835", "#1E88E5", "#E53935", "#8E24AA", "#FB8C00", "#43A047", "#B71C1C", "#111111", "#FFEE58", "#42A5F5", "#EF5350", "#AB47BC", "#FFA726", "#66BB6A", "#D32F2F"];

let balls = [];
let isDragging = false;
let mouse = { x: 0, y: 0 };
let cueBall;

class Ball {
    constructor(x, y, color, num, isCue = false) {
        this.x = x; this.y = y;
        this.vx = 0; this.vy = 0;
        this.color = color;
        this.num = num;
        this.isCue = isCue;
    }

    draw() {
        // ظل الكرة الممتد
        ctx.shadowBlur = 8;
        ctx.shadowColor = "rgba(0,0,0,0.5)";
        ctx.shadowOffsetX = 4;
        ctx.shadowOffsetY = 4;

        // جسم الكرة بتدرج 3D احترافي
        let grad = ctx.createRadialGradient(this.x - 5, this.y - 5, 2, this.x, this.y, BALL_R);
        grad.addColorStop(0, "#ffffff"); // بقعة الضوء
        grad.addColorStop(0.3, this.color);
        grad.addColorStop(1, "#000000");

        ctx.beginPath();
        ctx.arc(this.x, this.y, BALL_R, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.shadowColor = "transparent"; // إعادة تصفير الظل لبقية العناصر

        // إضافة رقم الكرة
        if (!this.isCue) {
            ctx.beginPath();
            ctx.arc(this.x, this.y, BALL_R * 0.5, 0, Math.PI * 2);
            ctx.fillStyle = "white";
            ctx.fill();
            
            ctx.fillStyle = "black";
            ctx.font = "bold 10px Arial";
            ctx.textAlign = "center";
            ctx.fillText(this.num, this.x, this.y + 3.5);
        }
    }

    update() {
        this.x += this.vx; this.y += this.vy;
        this.vx *= FRICTION; this.vy *= FRICTION;
        if (Math.hypot(this.vx, this.vy) < 0.12) { this.vx = 0; this.vy = 0; }

        if (this.x < BALL_R + 10 || this.x > canvas.width - BALL_R - 10) this.vx *= -0.8;
        if (this.y < BALL_R + 10 || this.y > canvas.height - BALL_R - 10) this.vy *= -0.8;
        this.x = Math.max(BALL_R + 10, Math.min(canvas.width - BALL_R - 10, this.x));
        this.y = Math.max(BALL_R + 10, Math.min(canvas.height - BALL_R - 10, this.y));
    }
}

function initTable() {
    balls = [];
    cueBall = new Ball(230, canvas.height/2, "#FFFFFF", 0, true);
    balls.push(cueBall);

    let count = 1;
    const startX = 620;
    const startY = canvas.height/2;
    for (let r = 0; r < 5; r++) {
        for (let i = 0; i <= r; i++) {
            let color = COLORS[count];
            if (r === 2 && i === 1) color = "#111111"; // الكرة رقم 8
            balls.push(new Ball(startX + r * 24, startY - (r * 13.5) + (i * 27), color, count));
            count++;
        }
    }
}

function drawTable() {
    // خلفية القماش مع تدرج إضاءة في المنتصف
    let tableGrad = ctx.createRadialGradient(450, 225, 50, 450, 225, 600);
    tableGrad.addColorStop(0, "#3a86c0");
    tableGrad.addColorStop(1, "#1e4a73");
    ctx.fillStyle = tableGrad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // الخط الأبيض (المنطقة D)
    ctx.strokeStyle = "rgba(255,255,255,0.3)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(230, 10);
    ctx.lineTo(230, 440);
    ctx.stroke();

    // الفتحات (Pockets) بتأثير عمق
    [[0,0], [450, -5], [900,0], [0,450], [450, 455], [900,450]].forEach(p => {
        ctx.beginPath();
        ctx.arc(p[0], p[1], POCKET_R, 0, Math.PI*2);
        ctx.fillStyle = "#050505";
        ctx.fill();
        ctx.strokeStyle = "#444";
        ctx.stroke();
    });
}

function resolveCollisions() {
    for (let i = 0; i < balls.length; i++) {
        for (let j = i + 1; j < balls.length; j++) {
            let b1 = balls[i], b2 = balls[j];
            let dist = Math.hypot(b2.x - b1.x, b2.y - b1.y);
            if (dist < BALL_R * 2) {
                let angle = Math.atan2(b2.y - b1.y, b2.x - b1.x);
                let overlap = BALL_R * 2 - dist;
                b1.x -= Math.cos(angle) * overlap / 2;
                b1.y -= Math.sin(angle) * overlap / 2;
                b2.x += Math.cos(angle) * overlap / 2;
                b2.y += Math.sin(angle) * overlap / 2;

                let v1 = Math.sqrt(b1.vx**2 + b1.vy**2);
                let v2 = Math.sqrt(b2.vx**2 + b2.vy**2);
                let dir1 = Math.atan2(b1.vy, b1.vx);
                let dir2 = Math.atan2(b2.vy, b2.vx);

                let vx1 = v1 * Math.cos(dir1 - angle);
                let vy1 = v1 * Math.sin(dir1 - angle);
                let vx2 = v2 * Math.cos(dir2 - angle);
                let vy2 = v2 * Math.sin(dir2 - angle);

                b1.vx = (vx2 * Math.cos(angle) + vy1 * Math.cos(angle + Math.PI/2));
                b1.vy = (vx2 * Math.sin(angle) + vy1 * Math.sin(angle + Math.PI/2));
