<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محاكي كاونتر سترايك 1.6 - CS 1.6 Web Simulator</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            user-select: none;
        }

        body {
            background-color: #050505;
            color: #fff;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* حاوية اللعبة الرئيسية (خريطة Dust 2) */
        #game-container {
            position: relative;
            width: 1024px;
            height: 600px;
            background: url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=1024&auto=format&fit=crop') no-repeat center center;
            background-size: cover; /* سنستخدم تأثير مرئي يحاكي الخريطة الرملية لـ De_Dust2 */
            border: 4px solid #444;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            overflow: hidden;
            cursor: crosshair;
        }

        /* الفلتر الرملي الكلاسيكي لـ Dust2 */
        #game-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(210, 180, 140, 0.2); /* تأثير لون رملي */
            pointer-events: none;
            z-index: 1;
        }

        /* واجهة المستخدم والعدادات السفلى (HUD) */
        #hud {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: rgba(0, 0, 0, 0.85);
            border-top: 2px solid #555;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            z-index: 10;
        }

        .hud-item {
            font-size: 1.8rem;
            font-weight: 900;
            color: #ffb300; /* اللون البرتقالي الكلاسيكي لكاونتر */
            text-shadow: 0 0 10px rgba(255, 179, 0, 0.6);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* الأعداء (الشرطة / الإرهابيين) */
        .target {
            position: absolute;
            width: 80px;
            height: 120px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: bottom center;
            z-index: 5;
            transform-origin: bottom center;
            transition: transform 0.2s ease-out;
            cursor: crosshair;
        }

        /* الدماء المؤقتة عند الإصابة */
        .blood-splatter {
            position: absolute;
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, rgba(255,0,0,0.9) 0%, rgba(150,0,0,0.7) 50%, transparent 100%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 6;
            transform: translate(-50%, -50%);
            animation: splat 0.4s ease-out forwards;
        }

        @keyframes splat {
            0% { transform: translate(-50%, -50%) scale(0.3); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.2); opacity: 0; }
        }

        /* السلاح الذي يظهر بالأسفل */
        #weapon {
            position: absolute;
            bottom: 65px;
            right: 15%;
            width: 320px;
            height: 240px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: bottom right;
            pointer-events: none;
            z-index: 8;
            transform-origin: bottom right;
        }

        /* تأثير إطلاق النار (فلاش الفوهة) */
        #muzzle-flash {
            position: absolute;
            bottom: 180px;
            right: 32%;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, #fff 10%, #ff6a00 50%, transparent 80%);
            border-radius: 50%;
            opacity: 0;
            pointer-events: none;
            z-index: 9;
        }

        /* شاشة البدء والنهاية */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            gap: 20px;
        }

        .overlay h2 {
            font-size: 3rem;
            color: #ffb300;
            text-shadow: 0 0 15px rgba(255, 179, 0, 0.8);
        }

        .play-btn {
            background-color: #ffb300;
            color: black;
            border: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: 900;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255,179,0,0.4);
            transition: all 0.2s;
        }

        .play-btn:hover {
            transform: scale(1.05);
            background-color: #ffd000;
        }

        /* ارتزاز الشاشة عند إطلاق النار الكثيف */
        .shake {
            animation: screenShake 0.1s ease-in-out alternate 2;
        }

        @keyframes screenShake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            100% { transform: translate(-1px, -2px) rotate(-0.5deg); }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- شاشة البدء -->
        <div id="start-overlay" class="overlay">
            <h2>محاكي كاونتر سترايك 1.6</h2>
            <p style="color: #aaa; margin-bottom: 10px;">اضغط على الأهداف الحمراء بأسرع ما يمكن لتسجيل النقاط!</p>
            <button class="play-btn" onclick="startGame()">ابدأ اللعب (START)</button>
        </div>

        <!-- شاشة نهاية اللعبة -->
        <div id="gameover-overlay" class="overlay" style="display: none;">
            <h2>انتهاء الجولة (ROUND OVER)</h2>
            <p id="final-score" style="font-size: 1.5rem; color: #fff;">النقاط المسجلة: 0</p>
            <button class="play-btn" onclick="startGame()">إعادة المحاولة</button>
        </div>

        <!-- واجهة فلاش الفوهة عند إطلاق النار -->
        <div id="muzzle-flash"></div>

        <!-- مجسم السلاح بالأسفل -->
        <div id="weapon"></div>

        <!-- لوحة العدادات (HUD) -->
        <div id="hud">
            <div class="hud-item" id="hud-health">❤️ 100</div>
            <div class="hud-item" id="hud-score">🎯 النقاط: 0</div>
            <div class="hud-item" id="hud-ammo">🔋 الذخيرة: 7 / 7</div>
            <div class="hud-item" id="hud-timer">⏰ الوقت: 30</div>
        </div>
    </div>

    <!-- توليد المؤثرات الصوتية برمجياً لمنع مشاكل التحميل الخارجية -->
    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // دالة لتوليد صوت طلقة نارية أصلية (Synthesized Gunshot)
        function playGunSound(isAwp = true) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const bufferSize = audioCtx.sampleRate * (isAwp ? 1.5 : 0.5);
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }

            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;

            const filter = audioCtx.createBiquadFilter();
            filter.type = 'bandpass';
            filter.frequency.value = isAwp ? 300 : 600;

            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.8, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + (isAwp ? 0.8 : 0.3));

            noise.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);
            noise.start();
        }

        // دالة لتوليد صوت إعادة تعبئة الذخيرة (Reload Sfx)
        function playReloadSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(120, audioCtx.currentTime);
            osc.frequency.setValueAtTime(300, audioCtx.currentTime + 0.15);
            osc.frequency.setValueAtTime(180, audioCtx.currentTime + 0.3);

            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);

            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.45);
        }
    </script>

    <script>
        const container = document.getElementById('game-container');
        const startOverlay = document.getElementById('start-overlay');
        const gameoverOverlay = document.getElementById('gameover-overlay');
        const scoreHud = document.getElementById('hud-score');
        const ammoHud = document.getElementById('hud-ammo');
        const timerHud = document.getElementById('hud-timer');
        const weapon = document.getElementById('weapon');
        const muzzleFlash = document.getElementById('muzzle-flash');
        const finalScoreText = document.getElementById('final-score');

        // روابط صور الأسلحة الكلاسيكية الشفافة
        const AWP_IMG = 'https://images.gamebanana.com/img/ico/sprays/5b6f04b2a30bb.png'; // سلاح القناص
        const DEAGLE_IMG = 'https://images.gamebanana.com/img/ico/sprays/53bfbfb49f485.png'; // سلاح الفرد

        // صور الجنود والخصوم الكلاسيكيين
        const ENEMY_IMGS = [
            'https://images.gamebanana.com/img/ico/sprays/5c22502c38cfd.png', // إرهابي كلاسيكي 1
            'https://images.gamebanana.com/img/ico/sprays/cs_spray_0027.png'   // إرهابي كلاسيكي 2
        ];

        let score = 0;
        let ammo = 7;
        let isReloading = false;
        let timeLeft = 30;
        let gameInterval = null;
        let targetSpawning = null;

        weapon.style.backgroundImage = `url('${AWP_IMG}')`;

        function startGame() {
            // تصفير البيانات للبدء من جديد
            score = 0;
            ammo = 7;
            timeLeft = 30;
            isReloading = false;
            
            scoreHud.textContent = `🎯 النقاط: ${score}`;
            ammoHud.textContent = `🔋 الذخيرة: ${ammo} / 7`;
            timerHud.textContent = `⏰ الوقت: ${timeLeft}`;

            startOverlay.style.display = 'none';
            gameoverOverlay.style.display = 'none';

            // تنظيف الحاوية من أي خصوم قدامى
            document.querySelectorAll('.target').forEach(t => t.remove());

            // بدء مؤقت الوقت التنازلي
            gameInterval = setInterval(() => {
                timeLeft--;
                timerHud.textContent = `⏰ الوقت: ${timeLeft}`;
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            // بدء آلية ظهور الخصوم بشكل عشوائي ومستمر
            spawnTarget();
            targetSpawning = setInterval(spawnTarget, 1100);
        }

        // إنشاء خصم وظهوره بمكان عشوائي
        function spawnTarget() {
            if (timeLeft <= 0) return;

            const target = document.createElement('div');
            target.className = 'target';
            
            // اختيار مظهر عشوائي للعدو
            const randomImg = ENEMY_IMGS[Math.floor(Math.random() * ENEMY_IMGS.length)];
            target.style.backgroundImage = `url('${randomImg}')`;

            // إحداثيات ظهور عشوائية داخل اللعبة
            const x = Math.random() * (container.clientWidth - 120) + 20;
            const y = Math.random() * (container.clientHeight - 250) + 120; // ضمان عدم الظهور داخل واجهة الـ HUD

            target.style.left = `${x}px`;
            target.style.top = `${y}px`;

            // ميزة الـ Hitbox للرأس لجعل اللعب احترافياً
            target.addEventListener('mousedown', (e) => {
                e.stopPropagation(); // منع إطلاق النار العشوائي في الفراغ
                hitEnemy(target, e);
            });

            container.appendChild(target);

            // يختفي الخصم تلقائياً بعد ثانيتين إذا لم تقم بقنصه
            setTimeout(() => {
                if (target.parentNode) {
                    target.remove();
                }
            }, 1800);
        }

        // إطلاق النار والتعامل مع الكانفاس
        container.addEventListener('mousedown', (e) => {
            if (isReloading || timeLeft <= 0) return;

            if (ammo <= 0) {
                reloadWeapon();
                return;
            }

            // تقليل الذخيرة وإشعال النار
            ammo--;
            ammoHud.textContent = `🔋 الذخيرة: ${ammo} / 7`;
            
            playGunSound(true); // تشغيل الصوت
            triggerMuzzleFlash();

            // تأثير اهتزاز الشاشة لارتداد السلاح (Recoil)
            container.classList.add('shake');
            setTimeout(() => container.classList.remove('shake'), 150);

            if (ammo === 0) {
                reloadWeapon();
            }
        });

        // وميض فلاش البندقية الكلاسيكي
        function triggerMuzzleFlash() {
            muzzleFlash.style.opacity = '1';
            setTimeout(() => {
                muzzleFlash.style.opacity = '0';
            }, 50);
        }

        // قنص وقتل الخصم
        function hitEnemy(target, event) {
            if (ammo <= 0 || isReloading) return;

            score += 10;
            scoreHud.textContent = `🎯 النقاط: ${score}`;

            // صنع رذاذ دماء كاونتر سترايك الأصلي مكان الطلقة
            const rect = container.getBoundingClientRect();
            const blood = document.createElement('div');
            blood.className = 'blood-splatter';
            blood.style.left = `${event.clientX - rect.left}px`;
            blood.style.top = `${event.clientY - rect.top}px`;
            container.appendChild(blood);

            // تدمير الخصم بحركة سقوط سريعة
            target.style.transform = 'scaleY(0)';
            setTimeout(() => {
                target.remove();
                blood.remove();
            }, 200);
        }

        // إعادة التعبئة التلقائية (Reload)
        function reloadWeapon() {
            if (isReloading) return;
            isReloading = true;
            ammoHud.textContent = `🔋 جاري التلقيم...`;
            
            playReloadSound();

            // أنيميشن حركة السلاح للأسفل لإعادة التعبئة
            weapon.style.transform = 'translateY(150px) rotate(15deg)';

            setTimeout(() => {
                ammo = 7;
                ammoHud.textContent = `🔋 الذخيرة: ${ammo} / 7`;
                weapon.style.transform = 'none';
                isReloading = false;
            }, 1200);
        }

        // إنهاء جولة اللعب
        function endGame() {
            clearInterval(gameInterval);
            clearInterval(targetSpawning);
            document.querySelectorAll('.target').forEach(t => t.remove());
            finalScoreText.textContent = `النقاط المسجلة بنجاح: ${score}`;
            gameoverOverlay.style.display = 'flex';
        }
    </script>
</body>
</html>
