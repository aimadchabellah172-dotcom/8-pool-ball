<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>البلياردو العالمية - Pro Master v2</title>
    <style>
        :root { --gold: #ffcc00; --felt: #1e5d32; --wood: #4d2d18; }
        body { margin: 0; background: #121212; color: white; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        
        /* واجهة المستخدم */
        #game-header { width: 1000px; display: flex; justify-content: space-around; padding: 20px; background: linear-gradient(to bottom, #222, #000); border-radius: 15px 15px 0 0; margin-top: 5px; border: 2px solid #333; }
        .player { padding: 10px 30px; border-radius: 10px; background: #1a1a1a; transition: 0.3s; border-left: 5px solid transparent; }
        .active { border-left-color: var(--gold); background: #2a2a2a; box-shadow: 0 0 20px rgba(255, 204, 0, 0.2); }
        
        /* طاولة اللعب */
        #canvas-container { position: relative; padding: 25px; background: var(--wood); border-radius: 40px; box-shadow: 0 30px 60px rgba(0,0,0,0.8); margin-top: 10px; }
        canvas { border-radius: 10px; cursor: crosshair; background: var(--felt); }
        
        /* شريط القوة الجانبي */
        .power-meter { position: absolute; left: -40px; bottom: 50px; width: 15px; height: 350px; background: #111; border: 2px solid #444; border-radius: 10px; overflow: hidden; }
        #power-fill { width: 100%; height: 0%; background: linear-gradient(to top, #2ecc71, #f1c40f, #e74c3c); position: absolute; bottom: 0; transition: height 0.05s; }
        
        #hint { margin-top: 15px; color: #888; font-size: 13px; }
        .foul-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); color: var(--gold); padding: 20px; border-radius: 10px; display: none; z-index: 10; font-weight: bold; }
    </style>
</head>
<body>

<div id="game-header">
    <div id="p1" class="player active">اللاعب 1 <br> <small>سادة - Solids</small></div>
    <div id="msg" style="align-self: center; font-weight: bold; color: var(--gold);">دور اللاعب 1</div>
    <div id="p2" class="player">اللاعب 2 <br> <small>مقلمة - Striped</small></div>
</div>

<div id="canvas-container">
    <div id="foul-hint" class="foul-msg">خطأ! يمكنك تحريك الكرة البيضاء الآن</div>
    <div class="power-meter"><div id="power-fill"></div></div>
    <canvas id="poolCanvas"></canvas>
</div>

<div id="hint">اضغط واسحب خلف الكرة للضرب | عند الخطأ: اسحب الكرة البيضاء لوضعها في أي مكان</div>

<script>
const canvas = document.getElementById('poolCanvas');
const ctx = canvas.getContext('2d');
const powerFill = document.getElementById('power-fill');
const foulHint = document.getElementById('foul-hint');

canvas.width = 1000;
canvas.height = 500;

const PHYSICS = {
    ballRad: 14,
    friction: 0.985,
    wallBounce: 0.75,
    maxPower: 40,
    pocketRad: 32
};

let balls = [];
let pockets = [];
let isDragging = false;
let ballInHand = false; // وضع تحريك الكرة باليد
let cueAngle = 0;
let power = 0;
let currentPlayer = 1;

class Ball {
    constructor(x, y, id, color, type) {
        this.x = x; this.y = y;
        this.vx = 0; this.vy = 0;
        this.id = id; this.color = color;
        this.type = type;
        this.inPocket = false;
        this.rot = 0;
    }

    draw() {
        if (this.inPocket) return;

        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rot);

        // ظل الكرة الملقى على الطاولة
        ctx.shadowBlur = 10;
        ctx.shadowColor = "rgba(0,0,0,0.4)";
        ctx.shadowOffsetX = 4;
        ctx.shadowOffsetY = 4;

        // جسم الكرة مع لمعان 3D
        let grad = ctx.createRadialGradient(-this.ballRad/3, -this.ballRad/3, 1, 0, 0, PHYSICS.ballRad);
        grad.addColorStop(0, '#fff');
        grad.addColorStop(0.3, this.color);
        grad.addColorStop(1, '#000');

        ctx.beginPath();
        ctx.arc(0, 0, PHYSICS.ballRad, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();

        // رسم الرقم أو الخطوط
        if (this.id > 0) {
            ctx.shadowBlur = 0;
            ctx.shadowOffsetX = 0;
            ctx.beginPath();
            ctx.arc(0, 0, PHYSICS.ballRad/1.8, 0, Math.PI * 2);
            ctx.fillStyle = 'white';
            ctx.fill();
            
            ctx.fillStyle = 'black';
            ctx.font = "bold 11px Arial";
            ctx.textAlign = "center";
            ctx.fillText(this.id, 0, 4);

            if (this.type === 'striped') {
                ctx.strokeStyle = 'rgba(255,255,255,0.7)';
                ctx.lineWidth = 4;
                ctx.stroke();
            }
        }
        ctx.restore();
    }

    update() {
        if (this.inPocket || ballInHand) return;

        this.x += this.vx;
        this.y += this.vy;
        this.vx *= PHYSICS.friction;
        this.vy *= PHYSICS.friction;
        this.rot += (Math.abs(this.vx) + Math.abs(this.vy)) * 0.05;

        if (Math.abs(this.vx) < 0.15) this.vx = 0;
        if (Math.abs(this.vy) < 0.15) this.vy = 0;

        // الارتداد عن الحواف
        if (this.x + PHYSICS.ballRad > canvas.width || this.x - PHYSICS.ballRad < 0) {
            this.vx *= -PHYSICS.wallBounce;
            this.x = this.x < PHYSICS.ballRad ? PHYSICS.ballRad : canvas.width - PHYSICS.ballRad;
        }
        if (this.y + PHYSICS.ballRad > canvas.height || this.y - PHYSICS.ballRad < 0) {
            this.vy *= -PHYSICS.wallBounce;
            this.y = this.y < PHYSICS.ballRad ? PHYSICS.ballRad : canvas.height - PHYSICS.ballRad;
        }
    }
}

function initGame() {
    pockets = [
        {x:0, y:0}, {x:500, y:0}, {x:1000, y:0},
        {x:0, y:500}, {x:500, y:500}, {x:1000, y:500}
    ];

    balls = [];
    // الكرة البيضاء
    balls.push(new Ball(250, 250, 0, '#ffffff', 'cue'));

    // توزيع الكرات (تراكم المثلث)
    const colors = ['#f1c40f', '#2980b9', '#e74c3c', '#8e44ad', '#e67e22', '#27ae60', '#95a5a6', '#000000'];
    let count = 1;
    for (let i = 0; i < 5; i++) {
        for (let j = 0; j <= i; j++) {
            let x = 650 + i * (PHYSICS.ballRad * 1.8);
            let y = 250 - (i * PHYSICS.ballRad) + (j * PHYSICS.ballRad * 2.1);
            let type = count > 8 ? 'striped' : 'solid';
            if (count === 8) type = '8ball';
            balls.push(new Ball(x, y, count, colors[(count-1)%8], type));
            count++;
        }
    }
}

function resolveCollisions() {
    for (let i = 0; i < balls.length; i++) {
        for (let j = i + 1; j < balls.length; j++) {
            let b1 = balls[i], b2 = balls[j];
            if (b1.inPocket || b2.inPocket) continue;

            let dx = b2.x - b1.x, dy = b2.y - b1.y;
            let dist = Math.hypot(dx, dy);

            if (dist < PHYSICS.ballRad * 2) {
                // منع التداخل
                let angle = Math.atan2(dy, dx);
                let target = PHYSICS.ballRad * 2;
                let overlap = target - dist;
                b1.x -= Math.cos(angle) * overlap / 2;
                b1.y -= Math.sin(angle) * overlap / 2;
                b2.x += Math.cos(angle) * overlap / 2;
                b2.y += Math.sin(angle) * overlap / 2;

                // تبادل السرعات
                let v1n = b1.vx * Math.cos(angle) + b1.vy * Math.sin(angle);
                let v2n = b2.vx * Math.cos(angle) + b2.vy * Math.sin(angle);
                
                let v1t = -b1.vx * Math.sin(angle) + b1.vy * Math.cos(angle);
                let v2t = -b2.vx * Math.sin(angle) + b2.vy * Math.cos(angle);

                b1.vx = v2n * Math.cos(angle) - v1t * Math.sin(angle);
                b1.vy = v2n * Math.sin(angle) + v1t * Math.cos(angle);
                b2.vx = v1n * Math.cos(angle) - v2t * Math.sin(angle);
                b2.vy = v1n * Math.sin(angle) + v2t * Math.cos(angle);
            }
        }
    }
}

function checkPockets() {
    balls.forEach(b => {
        if (b.inPocket) return;
        pockets.forEach(p => {
            if (Math.hypot(b.x - p.x, b.y - p.y) < PHYSICS.pocketRad) {
                b.inPocket = true;
                b.vx = 0; b.vy = 0;
                if (b.type === 'cue') triggerFoul();
            }
        });
    });
}

function triggerFoul() {
    ballInHand = true;
    foulHint.style.display = 'block';
    balls[0].inPocket = false;
    balls[0].vx = 0; balls[0].vy = 0;
    switchPlayer();
}

function switchPlayer() {
    currentPlayer = currentPlayer === 1 ? 2 : 1;
    document.getElementById('p1').classList.toggle('active');
    document.getElementById('p2').classList.toggle('active');
    document.getElementById('msg').innerText = "دور اللاعب " + currentPlayer;
}

// التحكم بالماوس
let mouse = { x: 0, y: 0 };
canvas.addEventListener('mousemove', (e) => {
    let rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;

    if (ballInHand) {
        balls[0].x = mouse.x;
        balls[0].y = mouse.y;
    } else if (isDragging) {
        let dx = mouse.x - balls[0].x;
        let dy = mouse.y - balls[0].y;
        power = Math.min(Math.hypot(dx, dy) / 5, PHYSICS.maxPower);
        powerFill.style.height = (power / PHYSICS.maxPower * 100) + "%";
    } else {
        cueAngle = Math.atan2(mouse.y - balls[0].y, mouse.x - balls[0].x);
    }
});

canvas.addEventListener('mousedown', () => {
    if (ballInHand) {
        ballInHand = false;
        foulHint.style.display = 'none';
    } else if (balls.every(b => b.vx === 0 && b.vy === 0)) {
        isDragging = true;
    }
});

canvas.addEventListener('mouseup', () => {
    if (isDragging) {
        balls[0].vx = -Math.cos(cueAngle) * power;
        balls[0].vy = -Math.sin(cueAngle) * power;
        isDragging = false;
        power = 0;
        powerFill.style.height = "0%";
        setTimeout(() => { if(balls.every(b => b.vx === 0 && b.vy === 0)) switchPlayer(); }, 3000);
    }
});

function drawTable() {
    // رسم القماش مع تأثير الإضاءة في المنتصف
    let tableGrad = ctx.createRadialGradient(500, 250, 100, 500, 250, 600);
    tableGrad.addColorStop(0, '#2e8b57');
    tableGrad.addColorStop(1, '#1e5d32');
    ctx.fillStyle = tableGrad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // رسم الثقوب (Pockets)
    ctx.fillStyle = '#111';
    pockets.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, PHYSICS.pocketRad, 0, Math.PI * 2);
        ctx.fill();
        // حافة الثقب
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 3;
        ctx.stroke();
    });
}

function drawCue() {
    if (isDragging || (!ballInHand && balls.every(b => b.vx === 0 && b.vy === 0))) {
        ctx.save();
        ctx.translate(balls[0].x, balls[0].y);
        ctx.rotate(cueAngle);
        
        // رسم خط التصويب (Guide Line)
        ctx.setLineDash([5, 5]);
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.beginPath();
        ctx.moveTo(-20, 0);
        ctx.lineTo(-400, 0);
        ctx.stroke();

        // رسم العصا (Texture)
        let cueDist = isDragging ? power * 5 : 0;
        let cueGrad = ctx.createLinearGradient(30 + cueDist, 0, 400 + cueDist, 0);
        cueGrad.addColorStop(0, '#fff'); // رأس العصا
        cueGrad.addColorStop(0.1, '#f3e5ab');
        cueGrad.addColorStop(0.8, '#5d3a1a'); // جسم خشبي
        cueGrad.addColorStop(1, '#000'); // المقبض

        ctx.fillStyle = cueGrad;
        ctx.beginPath();
        ctx.roundRect(30 + cueDist, -4, 380, 8, 4);
        ctx.fill();
        ctx.restore();
    }
}

function loop() {
    drawTable();
    resolveCollisions();
    checkPockets();
    
    balls.forEach(b => {
        b.update();
        b.draw();
    });

    drawCue();
    requestAnimationFrame(loop);
}

initGame();
loop();
</script>
</body>
</html>
