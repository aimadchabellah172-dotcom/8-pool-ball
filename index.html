<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Assistant</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        height: 100vh;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .container {
        width: 90%;
        max-width: 900px;
        height: 90vh;
        backdrop-filter: blur(15px);
        background: rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        box-shadow: 0 0 40px rgba(0,0,0,0.5);
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    header {
        padding: 20px;
        text-align: center;
        font-size: 22px;
        color: #fff;
        background: rgba(255,255,255,0.05);
        border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .chat-box {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
    }

    .message {
        margin-bottom: 15px;
        padding: 12px 15px;
        border-radius: 12px;
        max-width: 70%;
        animation: fadeIn 0.3s ease;
    }

    .user {
        background: #00c6ff;
        color: #000;
        margin-left: auto;
    }

    .bot {
        background: rgba(255,255,255,0.1);
        color: #fff;
        margin-right: auto;
    }

    @keyframes fadeIn {
        from {opacity: 0; transform: translateY(10px);}
        to {opacity: 1; transform: translateY(0);}
    }

    .input-area {
        display: flex;
        padding: 15px;
        border-top: 1px solid rgba(255,255,255,0.1);
    }

    input {
        flex: 1;
        padding: 12px;
        border-radius: 10px;
        border: none;
        outline: none;
        font-size: 16px;
    }

    button {
        margin-right: 10px;
        padding: 12px 20px;
        border: none;
        border-radius: 10px;
        background: #00c6ff;
        color: black;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #00a2d4;
    }

</style>
</head>

<body>

<div class="container">
    <header>🤖 AI Assistant</header>

    <div class="chat-box" id="chatBox"></div>

    <div class="input-area">
        <button onclick="sendMessage()">إرسال</button>
        <input type="text" id="userInput" placeholder="اكتب رسالتك...">
    </div>
</div>

<script>
const chatBox = document.getElementById("chatBox");

function addMessage(text, sender) {
    const msg = document.createElement("div");
    msg.classList.add("message", sender);
    msg.innerText = text;
    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function sendMessage() {
    const input = document.getElementById("userInput");
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    setTimeout(() => {
        addMessage(generateAIResponse(text), "bot");
    }, 700);
}

function generateAIResponse(input) {
    input = input.toLowerCase();

    if (input.includes("مرحبا")) return "أهلاً بك! كيف أقدر أساعدك؟";
    if (input.includes("اسمك")) return "أنا ذكاء اصطناعي متطور 🤖";
    if (input.includes("كيف حالك")) return "أنا بخير دائماً 😄";

    return "هذا رد ذكي تجريبي... يمكنك ربط API حقيقي لاحقاً.";
}

document.getElementById("userInput").addEventListener("keypress", function(e){
    if(e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
