<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بلياردو برو - النسخة النهائية</title>
    <style>
        body { margin: 0; background-color: #0f172a; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #game-wrapper { position: relative; padding: 25px; background: #2d1b0d; border-radius: 15px; box-shadow: 0 40px 100px rgba(0,0,0,0.9); border: 10px solid #4a3728; }
        canvas { background-color: #075985; border-radius: 5px; cursor: crosshair; display: block; }
        .ui-panel { width: 100%; max-width: 900px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: rgba(0,0,0,0.4); padding: 10px 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .power-meter { position: absolute; right: -60px; top: 100px; width: 40px; height: 300px; background: #111; border: 3px solid #444; border-radius: 8px; overflow: hidden; }
        #power-level { width: 100%; background: linear-gradient(to top, #ef4444, #fbbf24, #22c55e); position: absolute; bottom: 0; transition: height 0.05s; }
    </style>
</head>
<body>

<div class="ui-panel">
    <div style="font-size: 20px; font-weight: bold;">لاعب 1 <span style="color: #fbbf24;">●</span></div>
    <div style="text-align: center;">
        <div style="font-size: 14px; opacity: 0.7;">الحالة</div>
        <div id="game-status" style="font-weight: bold; color: #38bdf8;">اسحب الكرة البيضاء للتصويب</div>
    </div>
    <div style="font-size: 20px; font-weight: bold;"><span style="color: #94a3b8;">●</span> الكمبيوتر</div>
</div>

<div id="game-wrapper">
    <div class="power-meter"><div id="power-level" style="height: 0%"></div></div>
    <canvas id="poolTable"></canvas>
</div>

<div style="margin-top: 20px;">
    <button onclick="resetGame()" style="background: #e11d48; color: white; border: none; padding: 10px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s;" onmouseover="this.style.opacity=0.8" onmouseout="this.style.opacity=1">إعادة الطاولة</button>
</div>

<script>
const canvas = document.getElementById('poolTable');
const ctx = canvas.getContext('2d');
const powerLevel = document.getElementById('power-level');
const statusText = document.getElementById('game-status');

canvas.width = 900;
canvas.height = 450;

const BALL_RAD = 12;
const FRICTION = 0.985;
const POCKET_RAD = 28;

let balls = [];
let cueBall;
let isDragging = false;
let mousePos = { x: 0, y: 0 };
let shotAngle = 0;
let shotPower = 0;

const colors = [
    "#fff", "#fbbf24", "#3b82f6", "#ef4444", "#8b5cf6", 
    "#f97316", "#22c55e", "#7f1d1d", "#111827", "#fde047",
    "#60a5fa", "#fca5a5", "#c084fc", "#fdba74", "#86efac", "#991b1b"
];

class Ball {
    constructor(x, y, num, color) {
        this.x = x; this.y = y; this.num = num; this.color = color;
        this.vx = 0; this.vy = 0; this.inPocket = false;
    }

    draw() {
        if (this.inPocket) return;
        
        // ظل الكرة
        ctx.beginPath();
        ctx.arc(this.x + 3, this.y + 3, BALL_RAD, 0, Math.PI*2);
        ctx.fillStyle = "rgba(0,0,0,0.3)";
        ctx.fill();

        // تدرج لوني ثلاثي الأبعاد
        let grad = ctx.createRadialGradient(this.x - 4, this.y - 4, 2, this.x, this.y, BALL_RAD);
        grad.addColorStop(0, "#fff");
        grad.addColorStop(0.3, this.color);
        grad.addColorStop(1, "#000");

        ctx.beginPath();
        ctx.arc(this.x, this.y, BALL_RAD, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();

        // الرقم (للكرات غير البيضاء)
        if (this.num > 0) {
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(this.x, this.y, BALL_RAD/1.8, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "black";
            ctx.font = "bold 10px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText(this.num, this.x, this.y + 4);
        }
    }

    update() {
        if (this.inPocket) return;
        this.x += this.vx; this.y += this.vy;
        this.vx *= FRICTION; this.vy *= FRICTION;

        if (Math.abs(this.vx) < 0.1 && Math.abs(this.vy) < 0.1) { this.vx = 0; this.vy = 0; }

        // تصادم الحواف (Cushions)
        if (this.x < BALL_RAD + 15 || this.x > canvas.width - BALL_RAD - 15) {
            this.vx *= -0.7;
            this.x = this.x < BALL_RAD + 15 ? BALL_RAD + 15 : canvas.width - BALL_RAD - 15;
        }
        if (this.y < BALL_RAD + 15 || this.y > canvas.height - BALL_RAD - 15) {
            this.vy *= -0.7;
            this.y = this.y < BALL_RAD + 15 ? BALL_RAD + 15 : canvas.height - BALL_RAD - 15;
        }

        // الكشف عن دخول الكرة في الحفرة
        const pockets = [
            [0,0], [450, -5], [900,0],
            [0,450], [450, 455], [900,450]
        ];
        pockets.forEach(p => {
            if (Math.hypot(this.x - p[0], this.y - p[1]) < POCKET_RAD + 5) {
                this.inPocket = true;
                if (this.num === 0) setTimeout(resetCue, 600);
            }
        });
    }
}

function initTable() {
    balls = [];
    cueBall = new Ball(250, 225, 0, colors[0]);
    balls.push(cueBall);

    // ترتيب مثلث الكرات
    let startX = 620;
    let startY = 225;
    let n = 1;
    for (let i = 0; i < 5; i++) {
        for (let j = 0; j <= i; j++) {
            balls.push(new Ball(startX + i * 22, startY - (i * 11.5) + j * 24, n, colors[n]));
            n++;
        }
    }
}

function resetCue() {
    cueBall.inPocket = false; cueBall.x = 250; cueBall.y = 225;
    cueBall.vx = 0; cueBall.vy = 0;
}

// خوارزمية التصويب المتقدمة (Aim Engine)
function drawAim() {
    if (!isDragging || Math.hypot(cueBall.vx, cueBall.vy) > 0) return;

    let dx = cueBall.x - mousePos.x;
    let dy = cueBall.y - mousePos.y;
    shotAngle = Math.atan2(dy, dx);
    
    // البحث عن نقطة الاصطدام
    let closestDist = 1000;
    let targetBall = null;

    balls.forEach(b => {
        if (b === cueBall || b.inPocket) return;

        // معادلة التقاطع بين الخط والدائرة
        let x1 = cueBall.x, y1 = cueBall.y;
        let x2 = x1 + Math.cos(shotAngle) * 1000, y2 = y1 + Math.sin(shotAngle) * 1000;
        
        let ballToLineDist = Math.abs((y2-y1)*b.x - (x2-x1)*b.y + x2*y1 - y2*x1) / Math.hypot(y2-y1, x2-x1);
        
        if (ballToLineDist < BALL_RAD * 2) {
            let dot = ((b.x-x1)*(x2-x1) + (b.y-y1)*(y2-y1)) / Math.pow(Math.hypot(x2-x1, y2-y1), 2);
            let projX = x1 + dot * (x2-x1);
            let projY = y1 + dot * (y2-y1);
            let distToProj = Math.hypot(projX - x1, projY - y1);
            
            if (dot > 0 && distToProj < closestDist) {
                closestDist = distToProj - Math.sqrt(Math.pow(BALL_RAD*2, 2) - Math.pow(ballToLineDist, 2));
                targetBall = b;
            }
        }
    });

    let endX = cueBall.x + Math.cos(shotAngle) * closestDist;
    let endY = cueBall.y + Math.sin(shotAngle) * closestDist;

    // 1. رسم خط التصويب المتقطع
    ctx.setLineDash([6, 6]);
    ctx.strokeStyle = "rgba(255, 255, 255, 0.4)";
    ctx.beginPath();
    ctx.moveTo(cueBall.x, cueBall.y);
    ctx.lineTo(endX, endY);
    ctx.stroke();

    // 2. رسم الكرة الشبحية (Ghost Ball)
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.arc(endX, endY, BALL_RAD, 0, Math.PI*2);
    ctx.strokeStyle = "rgba(255, 255, 255, 0.6)";
    ctx.stroke();

    if (targetBall) {
        // 3. مسار كرة الهدف بعد الضربة
        let targetAngle = Math.atan2(targetBall.y - endY, targetBall.x - endX);
        ctx.beginPath();
        ctx.moveTo(targetBall.x, targetBall.y);
        ctx.lineTo(targetBall.x + Math.cos(targetAngle) * 200, targetBall.y + Math.sin(targetAngle) * 200);
        ctx.strokeStyle = "#fbbf24";
        ctx.stroke();

        // 4. مسار الكرة البيضاء المنحرف (90 درجة)
        let cueAngle = targetAngle + (Math.sin(shotAngle - targetAngle) > 0 ? -Math.PI/2 : Math.PI/2);
        ctx.beginPath();
        ctx.moveTo(endX, endY);
        ctx.lineTo(endX + Math.cos(cueAngle) * 120, endY + Math.sin(cueAngle) * 120);
        ctx.strokeStyle = "rgba(255, 255, 255, 0.8)";
        ctx.stroke();
    }
}

function drawCue() {
    if (Math.hypot(cueBall.vx, cueBall.vy) > 0.1) return;
    
    let offset = isDragging ? shotPower * 1.5 : 0;
    ctx.save();
    ctx.translate(cueBall.x, cueBall.y);
    ctx.rotate(shotAngle);
    
    let cueGrad = ctx.createLinearGradient(20 + offset, 0, 400 + offset, 0);
    cueGrad.addColorStop(0, "#fde047");
    cueGrad.addColorStop(0.1, "#451a03");
    cueGrad.addColorStop(1, "#111");
    
    ctx.fillStyle = cueGrad;
    ctx.beginPath();
    ctx.roundRect(20 + offset, -4, 380, 8, 4);
    ctx.fill();
    ctx.restore();
}

// المدخلات
canvas.onmousedown = () => { if(Math.hypot(cueBall.vx, cueBall.vy) === 0) isDragging = true; };
window.onmousemove = (e) => {
    const rect = canvas.getBoundingClientRect();
    mousePos = { x: e.clientX - rect.left, y: e.clientY - rect.top };
    if (isDragging) {
        let d = Math.min(Math.hypot(mousePos.x - cueBall.x, mousePos.y - cueBall.y), 200);
        shotPower = d / 4;
        powerLevel.style.height = (d / 200) * 100 + "%";
    }
};
window.onmouseup = () => {
    if (isDragging) {
        cueBall.vx = Math.cos(shotAngle) * shotPower;
        cueBall.vy = Math.sin(shotAngle) * shotPower;
        isDragging = false;
        shotPower = 0;
        powerLevel.style.height = "0%";
    }
};

function checkCollisions() {
    for (let i = 0; i < balls.length; i++) {
        for (let j = i + 1; j < balls.length; j++) {
            let b1 = balls[i], b2 = balls[j];
            if (b1.inPocket || b2.inPocket) continue;
            let dist = Math.hypot(b2.x - b1.x, b2.y - b1.y);
            if (dist < BALL_RAD * 2) {
                let angle = Math.atan2(b2.y - b1.y, b2.x - b1.x);
                let overlap = BALL_RAD * 2 - dist;
                b1.x -= Math.cos(angle) * overlap/2; b1.y -= Math.sin(angle) * overlap/2;
                b2.x += Math.cos(angle) * overlap/2; b2.y += Math.sin(angle) * overlap/2;

                let v1n = b1.vx * Math.cos(angle) + b1.vy * Math.sin(angle);
                let v2n = b2.vx * Math.cos(angle) + b2.vy * Math.sin(angle);
                let v1t = -b1.vx * Math.sin(angle) + b1.vy * Math.cos(angle);
                let v2t = -b2.vx * Math.sin(angle) + b2.vy * Math.cos(angle);

                b1.vx = v2n * Math.cos(angle) - v1t * Math.sin(angle);
                b1.vy = v2n * Math.sin(angle) + v1t * Math.cos(angle);
                b2.vx = v1n * Math.cos(angle) - v2t * Math.sin(angle);
                b2.vy = v1n * Math.sin(angle) + v2t * Math.cos(angle);
            }
        }
    }
}

function drawTable() {
    // 1. الإطار الخارجي واللباد
    ctx.fillStyle = "#075985"; ctx.fillRect(0, 0, canvas.width, canvas.height); // قماش أزرق
    
    // 2. رسم الحفر (Pockets) كما في الصورة
    ctx.fillStyle = "#000";
    const pocketPositions = [
        [0,0], [450, -5], [900,0],
        [0,450], [450, 455], [900,450]
    ];
    pocketPositions.forEach(p => {
        ctx.beginPath();
        ctx.arc(p[0], p[1], POCKET_RAD, 0, Math.PI*2);
        ctx.fill();
        ctx.strokeStyle = "#444"; ctx.lineWidth = 2; ctx.stroke();
    });

    // 3. الحواف (Cushions)
    ctx.fillStyle = "#0c4a6e";
    ctx.fillRect(0, 0, canvas.width, 15); // فوق
    ctx.fillRect(0, canvas.height - 15, canvas.width, 15); // تحت
    ctx.fillRect(0, 0, 15, canvas.height); // يسار
    ctx.fillRect(canvas.width - 15, 0, 15, canvas.height); // يمين
}

function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawTable();
    
    balls.forEach(b => { b.update(); b.draw(); });
    checkCollisions();
    
    if (balls.every(b => b.vx === 0 && b.vy === 0)) {
        statusText.innerText = "جاهز للضرب - اسحب للماوس";
        drawAim();
        drawCue();
    } else {
        statusText.innerText = "تحرك الكرات...";
    }
    
    requestAnimationFrame(gameLoop);
}

function resetGame() { initTable(); }

initTable();
gameLoop();
</script>
</body>
</html>
