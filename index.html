<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>8-Ball Pool Master - Legendary Edition</title>
    <style>
        :root { --bg-dark: #080a0f; --table-blue: #2a699c; --wood-dark: #3e2723; }
        body { 
            background-color: var(--bg-dark); color: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        /* واجهة المستخدم العلوية HUD */
        #topUI {
            width: 940px; display: flex; justify-content: space-between; align-items: center;
            padding: 15px 0; z-index: 10;
        }
        .player-card { display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.05); padding: 5px 20px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.1); }
        .avatar { width: 50px; height: 50px; border-radius: 10px; border: 2px solid #ffd700; background-size: cover; position: relative; }
        .level-badge { position: absolute; bottom: -5px; right: -5px; background: #4caf50; font-size: 10px; padding: 2px 5px; border-radius: 5px; }
        .p-name { font-weight: bold; font-size: 18px; }
        .match-info { text-align: center; }
        .coin-prize { color: #ffd700; font-weight: bold; font-size: 20px; text-shadow: 0 0 10px rgba(255,215,0,0.5); }

        /* منطقة الطاولة */
        #container { position: relative; }
        canvas { 
            border: 22px solid var(--wood-dark); 
            border-radius: 15px; 
            box-shadow: 0 25px 80px rgba(0,0,0,0.9), inset 0 0 50px rgba(0,0,0,0.5);
            background-color: var(--table-blue);
        }

        /* مقياس القوة الجانبي */
        #powerMeter {
            position: absolute; right: -60px; top: 100px; width: 35px; height: 280px;
            background: #111; border: 3px solid #333; border-radius: 8px; overflow: hidden;
        }
        #powerInner { width: 100%; position: absolute; bottom: 0; background: linear-gradient(to top, #f44336, #ffeb3b, #4caf50); transition: height 0.05s; }
    </style>
</head>
<body>

    <div id="topUI">
        <div class="player-card">
            <div class="avatar" style="background-image: url('https://via.placeholder.com/50/green/white?text=S')"><div class="level-badge">43</div></div>
            <div><div class="p-name">Susan</div><div style="font-size: 12px; color: #888;">●●●●●○○</div></div>
        </div>
        <div class="match-info">
            <div style="background: #b71c1c; padding: 2px 15px; border-radius: 10px; font-size: 12px; margin-bottom: 5px;">MATCH</div>
            <div class="coin-prize">🪙 100</div>
        </div>
        <div class="player-card" style="flex-direction: row-reverse; text-align: right;">
            <div class="avatar" style="background-image: url('https://via.placeholder.com/50/red/white?text=B')"><div class="level-badge" style="background: #f44336;">78</div></div>
            <div><div class="p-name">Brian</div><div style="font-size: 12px; color: #888;">○○○○○○○</div></div>
        </div>
    </div>

    <div id="container">
        <canvas id="poolCanvas" width="940" height="470"></canvas>
        <div id="powerMeter"><div id="powerInner" style="height: 0%"></div></div>
    </div>

<script>
const canvas = document.getElementById('poolCanvas');
const ctx = canvas.getContext('2d');

// --- إعدادات المحرك ---
const BALL_R = 14;
const POCKET_R = 30;
const FRICTION = 0.988;
const WALL_BOUNCE = 0.75;
const BALL_COLORS = ["#FFF", "#FFD600", "#0D47A1", "#D32F2F", "#4A148C", "#FF6D00", "#1B5E20", "#3E2723", "#000", "#FFEE58", "#42A5F5", "#EF5350", "#AB47BC", "#FFAB40", "#66BB6A", "#C62828"];

let balls = [];
let cueBall;
let isDragging = false;
let mouse = { x: 0, y: 0 };
let currentPower = 0;

class Ball {
    constructor(x, y, color, num, isCue = false) {
        this.x = x; this.y = y; this.vx = 0; this.vy = 0;
        this.color = color; this.num = num; this.isCue = isCue;
        this.inPocket = false;
    }

    draw() {
        if (this.inPocket) return;

        // الظل الواقعي
        ctx.save();
        ctx.shadowColor = 'rgba(0,0,0,0.4)'; ctx.shadowBlur = 10; ctx.shadowOffsetX = 5; ctx.shadowOffsetY = 5;

        // جسم الكرة بتدرج مركب (Specular Highlight)
        let g = ctx.createRadialGradient(this.x - 5, this.y - 5, 2, this.x, this.y, BALL_R);
        g.addColorStop(0, "#fff");
        g.addColorStop(0.2, this.color);
        g.addColorStop(1, "#000");

        ctx.beginPath(); ctx.arc(this.x, this.y, BALL_R, 0, Math.PI*2);
        ctx.fillStyle = g; ctx.fill();
        ctx.restore();

        // الرقم والتصميم
        if (!this.isCue) {
            ctx.beginPath(); ctx.arc(this.x, this.y, BALL_R*0.5, 0, Math.PI*2);
            ctx.fillStyle = "white"; ctx.fill();
            ctx.fillStyle = "black"; ctx.font = "bold 10px Arial"; ctx.textAlign = "center";
            ctx.fillText(this.num, this.x, this.y + 3.5);
        }
    }

    update() {
        if (this.inPocket) return;
        this.x += this.vx; this.y += this.vy;
        this.vx *= FRICTION; this.vy *= FRICTION;
        if (Math.hypot(this.vx, this.vy) < 0.1) { this.vx = 0; this.vy = 0; }

        // تصادم الحواف (Cushions)
        const margin = 10; 
        if (this.x < BALL_R + margin || this.x > canvas.width - BALL_R - margin) {
            this.vx *= -WALL_BOUNCE;
            this.x = this.x < BALL_R + margin ? BALL_R + margin : canvas.width - BALL_R - margin;
        }
        if (this.y < BALL_R + margin || this.y > canvas.height - BALL_R - margin) {
            this.vy *= -WALL_BOUNCE;
            this.y = this.y < BALL_R + margin ? BALL_R + margin : canvas.height - BALL_R - margin;
        }
    }
}

    balls = [];
    cueBall = new Ball(250, canvas.height/2, "#FFF", 0, true);
    balls.push(cueBall);
