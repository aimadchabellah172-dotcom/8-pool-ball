<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بلياردو المحترفين - العالمية</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            border: 15px solid #5d3a1a;
            border-radius: 10px;
            cursor: crosshair;
        }
        #ui {
            position: absolute;
            top: 20px;
            color: white;
            text-align: center;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="ui">
        <h1>بلياردو برو - Pro Billiards</h1>
        <p>اسحب العصا خلف الكرة البيضاء ثم أفلت لضربها</p>
    </div>

<script>
    // إعدادات المحرك
    const { Engine, Render, Runner, Bodies, Composite, Mouse, MouseConstraint, Vector, Body, Events } = Matter;

    const engine = Engine.create();
    engine.gravity.y = 0; // الغاء الجاذبية (منظور علوي)

    const WIDTH = 1000;
    const HEIGHT = 500;
    const BALL_RADIUS = 12;

    const render = Render.create({
        element: document.body,
        engine: engine,
        options: {
            width: WIDTH,
            height: HEIGHT,
            wireframes: false,
            background: '#2d7d46' // لون القماش الأخضر
        }
    });

    // إنشاء حدود الطاولة (الوسائد)
    const wallOptions = { isStatic: true, restitution: 0.9, friction: 0.1, render: { fillStyle: '#1e5d32' } };
    const walls = [
        Bodies.rectangle(WIDTH/2, -10, WIDTH, 40, wallOptions), // أعلى
        Bodies.rectangle(WIDTH/2, HEIGHT+10, WIDTH, 40, wallOptions), // أسفل
        Bodies.rectangle(-10, HEIGHT/2, 40, HEIGHT, wallOptions), // يسار
        Bodies.rectangle(WIDTH+10, HEIGHT/2, 40, HEIGHT, wallOptions) // يمين
    ];
    Composite.add(engine.world, walls);

    // إنشاء الثقوب (Pockets)
    const pockets = [
        { x: 20, y: 20 }, { x: WIDTH/2, y: 15 }, { x: WIDTH-20, y: 20 },
        { x: 20, y: HEIGHT-20 }, { x: WIDTH/2, y: HEIGHT-15 }, { x: WIDTH-20, y: HEIGHT-20 }
    ];

    // إنشاء الكرات
    let balls = [];
    function createBall(x, y, color, isCue = false) {
        const ball = Bodies.circle(x, y, BALL_RADIUS, {
            restitution: 0.9,
            friction: 0.01,
            frictionAir: 0.015, // سرعة التوقف (الاحتكاك مع القماش)
            render: { 
                fillStyle: color,
                strokeStyle: '#000',
                lineWidth: isCue ? 2 : 0
            }
        });
        ball.isCue = isCue;
        balls.push(ball);
        return ball;
    }

    // وضع كرة المضرب
    const cueBall = createBall(250, HEIGHT/2, '#fff', true);

    // ترتيب كرات المثلث
    const startX = 700;
    const startY = HEIGHT/2;
    let row = 0;
    let count = 0;
    for(let i=0; i<5; i++) {
        for(let j=0; j<=i; j++) {
            const x = startX + (i * BALL_RADIUS * 1.8);
            const y = (startY - (i * BALL_RADIUS)) + (j * BALL_RADIUS * 2.1);
            const color = count === 4 ? '#000' : (count % 2 === 0 ? '#f1c40f' : '#e74c3c');
            createBall(x, y, color);
            count++;
        }
    }
    Composite.add(engine.world, balls);

    // متغيرات التحكم بالسحب
    let isDragging = false;
    let dragStart = { x: 0, y: 0 };
    let mousePos = { x: 0, y: 0 };

    const canvas = render.canvas;

    canvas.addEventListener('mousedown', (e) => {
        const rect = canvas.getBoundingClientRect();
        const mX = e.clientX - rect.left;
        const mY = e.clientY - rect.top;
        
        // التحقق من المسافة بين الماوس والكرة البيضاء
        const dist = Vector.magnitude(Vector.sub({x: mX, y: mY}, cueBall.position));
        if (dist < 50 && Vector.magnitude(cueBall.velocity) < 0.2) {
            isDragging = true;
            dragStart = { x: mX, y: mY };
        }
    });

    window.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        mousePos = { x: e.clientX - rect.left, y: e.clientY - rect.top };
    });

    window.addEventListener('mouseup', (e) => {
        if (isDragging) {
            const rect = canvas.getBoundingClientRect();
            const mX = e.clientX - rect.left;
            const mY = e.clientY - rect.top;

            // حساب القوة بناءً على مسافة السحب
            const forceVec = Vector.sub(cueBall.position, {x: mX, y: mY});
            const strength = Math.min(Vector.magnitude(forceVec) * 0.005, 0.2); // تحديد أقصى قوة
            
            Body.applyForce(cueBall, cueBall.position, {
                x: Math.cos(Math.atan2(forceVec.y, forceVec.x)) * strength,
                y: Math.sin(Math.atan2(forceVec.y, forceVec.x)) * strength
            });

            isDragging = false;
        }
    });

    // تحديث اللعبة المستمر
    Events.on(render, 'afterRender', () => {
        const context = render.context;

        // رسم الثقوب
        pockets.forEach(p => {
            context.beginPath();
            context.arc(p.x, p.y, 25, 0, Math.PI * 2);
            context.fillStyle = '#111';
            context.fill();
            context.closePath();
        });

        // رسم خط التصويب والعصا
        if (isDragging) {
            const dist = Vector.magnitude(Vector.sub(mousePos, cueBall.position));
            const angle = Math.atan2(mousePos.y - cueBall.position.y, mousePos.x - cueBall.position.x);
            
            // رسم العصا
            context.beginPath();
            context.moveTo(
                cueBall.position.x + Math.cos(angle) * 30,
                cueBall.position.y + Math.sin(angle) * 30
            );
            context.lineTo(
                cueBall.position.x + Math.cos(angle) * (30 + dist),
                cueBall.position.y + Math.sin(angle) * (30 + dist)
            );
            context.strokeStyle = 'rgba(210, 180, 140, 0.9)';
            context.lineWidth = 8;
            context.stroke();

            // خط الدليل الأمامي
            context.beginPath();
            context.setLineDash([5, 5]);
            context.moveTo(cueBall.position.x, cueBall.position.y);
            context.lineTo(
                cueBall.position.x - Math.cos(angle) * 200,
                cueBall.position.y - Math.sin(angle) * 200
            );
            context.strokeStyle = 'rgba(255,255,255,0.3)';
            context.lineWidth = 2;
            context.stroke();
            context.setLineDash([]);
        }

        // فحص دخول الكرات في الثقوب
        balls.forEach((ball, index) => {
            pockets.forEach(p => {
                const d = Vector.magnitude(Vector.sub(ball.position, p));
                if (d < 25) {
                    if (ball.isCue) {
                        // إعادة الكرة البيضاء
                        Body.setPosition(ball, { x: 250, y: HEIGHT/2 });
                        Body.setVelocity(ball, { x: 0, y: 0 });
                    } else {
                        // إزالة الكرة المسجلة
                        Composite.remove(engine.world, ball);
                        balls.splice(index, 1);
                    }
                }
            });

            // إضافة تأثير بصري للدوران
            const angle = ball.angle;
            context.beginPath();
            context.moveTo(ball.position.x, ball.position.y);
            context.lineTo(
                ball.position.x + Math.cos(angle) * BALL_RADIUS,
                ball.position.y + Math.sin(angle) * BALL_RADIUS
            );
            context.strokeStyle = 'rgba(0,0,0,0.5)';
            context.stroke();
        });
    });

    Render.run(render);
    const runner = Runner.create();
    Runner.run(runner, engine);

</script>
</body>
</html>
