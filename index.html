<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>8-Ball Pool Legendary - Fixed Edition</title>
    <style>
        /* إعدادات الخلفية العامة للموقع */
        body { 
            background-color: #0b0f19; /* خلفية الموقع زرقاء داكنة جداً وليست سوداء تماماً */
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* حاوية اللعبة لضمان ظهور كل شيء في مكانه */
        #gameContainer {
            position: relative;
            padding: 10px;
            background: #151b26;
            border-radius: 15px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        /* الواجهة العلوية HUD */
        #headerUI {
            width: 900px; display: flex; justify-content: space-between; align-items: center;
            padding: 10px 20px; box-sizing: border-box;
        }
        .player-info { display: flex; align-items: center; gap: 12px; }
        .avatar { 
            width: 50px; height: 50px; border-radius: 8px; border: 2px solid #fbc02d;
            background: #333; display: flex; align-items: center; justify-content: center; font-weight: bold;
        }
        .details b { font-size: 18px; display: block; }
        .details span { color: #888; font-size: 12px; }

        .match-badge {
            background: #d32f2f; padding: 4px 15px; border-radius: 20px; font-weight: bold;
            font-size: 12px; box-shadow: 0 2px 10px rgba(211,47,47,0.4);
        }
        .prize-money { color: #ffd700; font-size: 22px; font-weight: bold; text-align: center; margin-top: 5px; }

        /* منطقة الطاولة والقوة */
        #mainArea { display: flex; align-items: center; gap: 20px; }
        
        canvas { 
            background-color: #2a699c; /* لون القماش الأزرق الظاهر في الصورة */
            border: 18px solid #7b1e1e; /* الحواف الخشبية الحمراء */
            border-radius: 12px;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.5);
        }

        /* مقياس القوة الجانبي المطور */
        #powerBarWrapper {
            width: 35px; height: 350px; background: #111; border: 2px solid #444;
            border-radius: 8px; position: relative; overflow: hidden;
        }
        #powerLevel {
            width: 100%; position: absolute; bottom: 0;
            background: linear-gradient(to top, #ff1744, #ffea00, #00e676);
            transition: height 0.05s ease;
        }
    </style>
</head>
<body>

    <div id="headerUI">
        <div class="player-info">
            <div class="avatar" style="background: linear-gradient(45deg, #1b5e20, #4caf50);">S</div>
            <div class="details"><b>Susan</b><span>Level 43 ★</span></div>
        </div>
        
        <div>
            <div class="match-badge">MATCH</div>
            <div class="prize-money">🪙 100</div>
        </div>

        <div class="player-info" style="flex-direction: row-reverse; text-align: right;">
            <div class="avatar" style="background: linear-gradient(45deg, #b71c1c, #f44336);">B</div>
            <div class="details"><b>Brian</b><span>Level 78 ★</span></div>
        </div>
    </div>

    <div id="gameContainer">
        <div id="mainArea">
            <canvas id="poolCanvas" width="900" height="450"></canvas>
            <div id="powerBarWrapper">
                <div id="powerLevel" style="height: 0%"></div>
            </div>
        </div>
    </div>

<script>
const canvas = document.getElementById('poolCanvas');
const ctx = canvas.getContext('2d');

// --- إعدادات المحرك ---
const BALL_R = 14;
const POCKET_R = 32;
const FRICTION = 0.988; // احتكاك واقعي جداً
const COLORS = ["#FFFFFF", "#fdd835", "#1565c0", "#c62828", "#6a1b9a", "#ef6c00", "#2e7d32", "#4e342e", "#111111", "#fff176", "#64b5f6", "#e57373", "#ba68c8", "#ffb74d", "#81c784", "#a1887f"];

let balls = [];
let cueBall;
let isDragging = false;
let mouse = { x: 0, y: 0 };
let currentPower = 0;

class Ball {
    constructor(x, y, color, num, isCue = false) {
        this.x = x; this.y = y;
        this.vx = 0; this.vy = 0;
        this.color = color;
        this.num = num;
        this.isCue = isCue;
        this.inPocket = false;
    }

    draw() {
        if (this.inPocket) return;

        // الظل السفلي للكرة
        ctx.save();
        ctx.shadowBlur = 10; ctx.shadowColor = "rgba(0,0,0,0.5)";
        ctx.shadowOffsetX = 4; ctx.shadowOffsetY = 4;

        // رسم الكرة بتدرج ثلاثي الأبعاد
        let grad = ctx.createRadialGradient(this.x - 5, this.y - 5, 2, this.x, this.y, BALL_R);
        grad.addColorStop(0, "#ffffff"); // لمعة الضوء
        grad.addColorStop(0.3, this.color);
        grad.addColorStop(1, "#000000");

        ctx.beginPath();
        ctx.arc(this.x, this.y, BALL_R, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.restore();

        // رسم الرقم (الدائرة البيضاء والعدد)
        if (!this.isCue) {
            ctx.beginPath();
            ctx.arc(this.x, this.y, BALL_R * 0.5, 0, Math.PI * 2);
            ctx.fillStyle = "white";
            ctx.fill();
            ctx.fillStyle = "black";
            ctx.font = "bold 10px Arial";
            ctx.textAlign = "center";
            ctx.fillText(this.num, this.x, this.y + 4);
        }
    }

    update() {
        if (this.inPocket) return;
        this.x += this.vx; this.y += this.vy;
        this.vx *= FRICTION; this.vy *= FRICTION;

        if (Math.hypot(this.vx, this.vy) < 0.1) { this.vx = 0; this.vy = 0; }

        // تصادم الحواف
        const wall = 10;
        if (this.x < BALL_R + wall || this.x > canvas.width - BALL_R - wall) {
            this.vx *= -0.8;
            this.x = this.x
