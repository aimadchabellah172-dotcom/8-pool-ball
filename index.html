<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استوديو الرسم الاحترافي</title>
    <style>
        /* ستايل وتصميم الموقع */
        :root {
            --bg-color: #121214;
            --sidebar-color: #1a1a1e;
            --accent-color: #6366f1;
            --accent-hover: #4f46e5;
            --text-color: #f3f4f6;
            --border-color: #2d2d34;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* شريط الأدوات الجانبي */
        .sidebar {
            width: 320px;
            background-color: var(--sidebar-color);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 20px;
            overflow-y: auto;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            z-index: 10;
        }

        h2 {
            font-size: 1.2rem;
            text-align: center;
            color: var(--accent-color);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 5px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.85rem;
            color: #a1a1aa;
        }

        /* التحكم بالألوان والفرش */
        .color-picker-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            background: none;
            transition: transform 0.2s;
        }

        input[type="color"]:hover {
            transform: scale(1.1);
        }

        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch {
            border: 2px solid var(--border-color);
            border-radius: 50%;
        }

        select, input[type="range"], input[type="text"] {
            width: 100%;
            background-color: #27272a;
            border: 1px solid var(--border-color);
            color: white;
            padding: 10px;
            border-radius: 8px;
            outline: none;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        select:focus, input[type="text"]:focus {
            border-color: var(--accent-color);
        }

        /* الأزرار وتأثيراتها الحركية */
        .btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-danger {
            background-color: #ef4444;
        }
        .btn-danger:hover {
            background-color: #dc2626;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }

        .btn-secondary {
            background-color: #3f3f46;
        }
        .btn-secondary:hover {
            background-color: #52525b;
            box-shadow: 0 4px 12px rgba(82, 82, 91, 0.3);
        }

        /* قائمة الصفحات (الأوراق) */
        .pages-section {
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
        }

        .pages-list {
            list-style: none;
            margin-top: 10px;
            max-height: 150px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .page-item {
            background-color: #27272a;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            transition: background 0.2s;
            border: 1px solid transparent;
        }

        .page-item:hover {
            background-color: #3f3f46;
        }

        .page-item.active {
            border-color: var(--accent-color);
            background-color: rgba(99, 102, 241, 0.1);
        }

        .delete-page-btn {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 0.9rem;
        }

        /* منطقة الرسم الرئيسية */
        .canvas-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            background-image: radial-gradient(#2d2d34 1px, transparent 1px);
            background-size: 20px 20px;
            padding: 20px;
        }

        .canvas-container {
            background-color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: popIn 0.5s ease-out;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        /* تأثيرات حركية (Animations) */
        @keyframes popIn {
            from {
                transform: scale(0.9) translateY(20px);
                opacity: 0;
            }
            to {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }

        .canvas-switch-animation {
            animation: switchPage 0.4s ease-in-out;
        }

        @keyframes switchPage {
            0% { transform: scale(1) rotateY(0deg); opacity: 1; }
            50% { transform: scale(0.95) rotateY(90deg); opacity: 0.5; }
            100% { transform: scale(1) rotateY(0deg); opacity: 1; }
        }

        /* مؤشر الفرشاة العائم */
        .brush-preview {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
            position: absolute;
            pointer-events: none;
            transform: translate(-50%, -50%);
            display: none;
            z-index: 100;
        }
    </style>
</head>
<body>

    <!-- شريط الأدوات والتحكم -->
    <div class="sidebar">
        <h2>استوديو الإبداع</h2>

        <!-- الألوان والشفافية -->
        <div class="control-group">
            <label>لون الرسم / درجة اللون</label>
            <div class="color-picker-wrapper">
                <input type="color" id="colorPicker" value="#6366f1">
                <input type="range" id="opacity" min="1" max="100" value="100">
                <span id="opacityVal">100%</span>
            </div>
        </div>

        <!-- نوع الفرشاة وأسلوب الألوان -->
        <div class="control-group">
            <label>نوع الفرشاة (نوع الألوان)</label>
            <select id="brushType">
                <option value="solid">ألوان عادية (قلم صلب)</option>
                <option value="watercolor">ألوان مائية (دمج لطيف)</option>
                <option value="pencil">قلم رصاص (خشن ومظلل)</option>
                <option value="eraser">الممحاة</option>
            </select>
        </div>

        <!-- التظليل والنعومة -->
        <div class="control-group">
            <label>مستوى التظليل (ضبابية الفرشاة)</label>
            <input type="range" id="shadowBlur" min="0" max="30" value="0">
            <span id="shadowVal">بدون تظليل</span>
        </div>

        <!-- حجم وحجم الفرشاة -->
        <div class="control-group">
            <label>عرض الفرشاة / الممحاة</label>
            <input type="range" id="lineWidth" min="1" max="80" value="10">
            <span id="widthVal">10px</span>
        </div>

        <button class="btn btn-secondary" id="clearCanvas">مسح الورقة الحالية</button>
        <button class="btn" id="downloadImage">حفظ الرسمة كـ PNG</button>

        <!-- إدارة الأوراق الجديدة -->
        <div class="pages-section">
            <label style="font-weight: bold; color: white;">إدارة الأوراق والمشاريع</label>
            <div class="control-group" style="margin-top: 10px; flex-direction: row; gap: 5px;">
                <input type="text" id="newPageName" placeholder="اسم الورقة..." style="padding: 8px;">
                <button class="btn" id="addPageBtn" style="padding: 8px 12px;">+</button>
            </div>
            <ul class="pages-list" id="pagesList">
                <!-- الأوراق المضافة ستظهر هنا ديناميكياً -->
            </ul>
        </div>
    </div>

    <!-- مساحة الرسم الكانفاس -->
    <div class="canvas-area">
        <div class="canvas-container" id="canvasContainer">
            <canvas id="paintCanvas" width="800" height="600"></canvas>
        </div>
    </div>

    <!-- مؤشر الفرشاة التفاعلي -->
    <div class="brush-preview" id="brushPreview"></div>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvasContainer');
        const colorPicker = document.getElementById('colorPicker');
        const opacityRange = document.getElementById('opacity');
        const opacityVal = document.getElementById('opacityVal');
        const brushType = document.getElementById('brushType');
        const shadowRange = document.getElementById('shadowBlur');
        const shadowVal = document.getElementById('shadowVal');
        const lineWidthRange = document.getElementById('lineWidth');
        const widthVal = document.getElementById('widthVal');
        const clearBtn = document.getElementById('clearCanvas');
        const downloadBtn = document.getElementById('downloadImage');
        const brushPreview = document.getElementById('brushPreview');

        const newPageNameInput = document.getElementById('newPageName');
        const addPageBtn = document.getElementById('addPageBtn');
        const pagesList = document.getElementById('pagesList');

        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;

        // نظام إدارة الأوراق المتعددة وحفظها تلقائياً
        let pages = {
            "اللوحة الرئيسية": canvas.toDataURL()
        };
        let currentPageName = "اللوحة الرئيسية";

        // إعداد الكانفاس الأولي بخلفية بيضاء
        function clearCanvasToWhite() {
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        clearCanvasToWhite();
        pages["اللوحة الرئيسية"] = canvas.toDataURL(); // حفظ اللوحة الفارغة الأولى

        // تحديث قائمة الأوراق في الواجهة
        function renderPagesList() {
            pagesList.innerHTML = '';
            Object.keys(pages).forEach(name => {
                const li = document.createElement('li');
                li.className = `page-item ${name === currentPageName ? 'active' : ''}`;
                li.innerHTML = `
                    <span class="page-title">${name}</span>
                    ${name !== "اللوحة الرئيسية" ? `<button class="delete-page-btn" onclick="deletePage(event, '${name}')">🗑️</button>` : ''}
                `;
                li.addEventListener('click', () => switchPage(name));
                pagesList.appendChild(li);
            });
        }

        // التبديل بين الأوراق مع تأثير حركي (Animation)
        function switchPage(name) {
            if (name === currentPageName) return;
            
            // حفظ حالة الصفحة الحالية أولاً
            pages[currentPageName] = canvas.toDataURL();

            container.classList.add('canvas-switch-animation');
            
            setTimeout(() => {
                currentPageName = name;
                const img = new Image();
                img.onload = function() {
                    clearCanvasToWhite();
                    ctx.drawImage(img, 0, 0);
                };
                img.src = pages[name] || canvas.toDataURL();
                renderPagesList();
            }, 200);

            setTimeout(() => {
                container.classList.remove('canvas-switch-animation');
            }, 400);
        }

        // إضافة ورقة جديدة وتسميتها
        addPageBtn.addEventListener('click', () => {
            const name = newPageNameInput.value.trim();
            if (!name) {
                alert("يرجى إدخال اسم للورقة الجديدة!");
                return;
            }
            if (pages[name]) {
                alert("هذا الاسم موجود بالفعل!");
                return;
            }

            // حفظ الصفحة الحالية أولاً
            pages[currentPageName] = canvas.toDataURL();

            // إنشاء الورقة الجديدة
            currentPageName = name;
            clearCanvasToWhite();
            pages[name] = canvas.toDataURL();
            
            newPageNameInput.value = '';
            renderPagesList();
            
            // تأثير حركي لطيف للورقة الجديدة
            container.style.animation = 'none';
            setTimeout(() => { container.style.animation = 'popIn 0.5s ease-out'; }, 10);
        });

        // حذف ورقة رسم
        window.deletePage = function(event, name) {
            event.stopPropagation();
            if (confirm(`هل أنت متأكد من حذف ورقة "${name}"؟`)) {
                delete pages[name];
                if (currentPageName === name) {
                    switchPage("اللوحة الرئيسية");
                } else {
                    renderPagesList();
                }
            }
        };

        // تعديل خصائص الفرشاة قبل الرسم بناءً على الخيارات المحددة
        function applyBrushSettings() {
            const color = colorPicker.value;
            const opacity = opacityRange.value / 100;
            const size = lineWidthRange.value;
            const shadow = shadowRange.value;

            ctx.lineWidth = size;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            // تحويل اللون لـ RGBA للتحكم بالشفافية
            const r = parseInt(color.slice(1, 3), 16);
            const g = parseInt(color.slice(3, 5), 16);
            const b = parseInt(color.slice(5, 7), 16);

            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;

            const selectedStyle = brushType.value;

            if (selectedStyle === 'eraser') {
                ctx.strokeStyle = '#ffffff'; // الممحاة تمسح باللون الأبيض
                ctx.globalAlpha = 1.0;
            } else if (selectedStyle === 'solid') {
                ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${opacity})`;
                ctx.globalAlpha = 1.0;
                if (shadow > 0) {
                    ctx.shadowColor = `rgba(${r}, ${g}, ${b}, ${opacity})`;
                    ctx.shadowBlur = shadow;
                }
            } else if (selectedStyle === 'watercolor') {
                // ميزة الألوان المائية: تأثير تدرج مدمج وشفافية فائقة مع حواف ناعمة
                ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${opacity * 0.15})`;
                ctx.globalAlpha = 0.5;
                ctx.shadowColor = `rgba(${r}, ${g}, ${b}, ${opacity * 0.3})`;
                ctx.shadowBlur = size * 0.5; // التظليل يتناسب مع حجم الفرشاة للحصول على طابع مائي
            } else if (selectedStyle === 'pencil') {
                // ميزة قلم الرصاص: خطوط خشنة وتظليل متفرق
                ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${opacity * 0.7})`;
                ctx.globalAlpha = 0.8;
                if (shadow > 0) {
                    ctx.shadowColor = `rgba(${r}, ${g}, ${b}, ${opacity * 0.5})`;
                    ctx.shadowBlur = shadow * 0.3;
                }
            }
        }

        // حركة الرسم على الكانفاس
        function draw(e) {
            if (!isDrawing) return;

            applyBrushSettings();

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(x, y);
            ctx.stroke();

            [lastX, lastY] = [x, y];
        }

        canvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            lastX = e.clientX - rect.left;
            lastY = e.clientY - rect.top;
        });

        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', () => {
            isDrawing = false;
            // حفظ التحديثات تلقائياً في الذاكرة المؤقتة للورقة النشطة
            pages[currentPageName] = canvas.toDataURL();
        });
        canvas.addEventListener('mouseout', () => isDrawing = false);

        // مسح الكانفاس الحالي
        clearBtn.addEventListener('click', () => {
            if (confirm("هل تريد مسح اللوحة الحالية والبدء من جديد؟")) {
                clearCanvasToWhite();
                pages[currentPageName] = canvas.toDataURL();
            }
        });

        // حفظ وتحميل الصورة
        downloadBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = `${currentPageName}.png`;
            link.href = canvas.toDataURL();
            link.click();
        });

        // تحديث نصوص مؤشرات الأرقام (الشفافية والحجم)
        opacityRange.addEventListener('input', () => {
            opacityVal.textContent = `${opacityRange.value}%`;
        });

        shadowRange.addEventListener('input', () => {
            const val = shadowRange.value;
            shadowVal.textContent = val == 0 ? 'بدون تظليل' : `${val}px`;
        });

        lineWidthRange.addEventListener('input', () => {
            widthVal.textContent = `${lineWidthRange.value}px`;
            updateBrushPreview();
        });

        colorPicker.addEventListener('input', updateBrushPreview);

        // تحديث شكل مؤشر الماوس التفاعلي على لوحة الرسم
        function updateBrushPreview() {
            const size = lineWidthRange.value;
            brushPreview.style.width = `${size}px`;
            brushPreview.style.height = `${size}px`;
            brushPreview.style.backgroundColor = brushType.value === 'eraser' ? '#ffffff' : colorPicker.value;
        }

        canvas.addEventListener('mouseenter', () => brushPreview.style.display = 'block');
        canvas.addEventListener('mouseleave', () => brushPreview.style.display = 'none');
        canvas.addEventListener('mousemove', (e) => {
            brushPreview.style.left = `${e.clientX}px`;
            brushPreview.style.top = `${e.clientY}px`;
        });

        brushType.addEventListener('change', updateBrushPreview);

        // إنشاء القائمة الأولية عند تشغيل الموقع
        renderPagesList();
        updateBrushPreview();
    </script>
</body>
</html>
