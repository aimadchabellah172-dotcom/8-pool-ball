<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-tag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YUVAKS INDUSTRIE | Secure Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #fbc02d;
            --danger: #d32f2f;
            --bg: #ffffff;
            --text: #1a1a1a;
            --card-bg: #f9f9f9;
        }
        [data-theme="dark"] {
            --bg: #121212; --text: #ffffff; --card-bg: #1e1e1e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--bg); color: var(--text); transition: 0.3s; }

        /* Login Overlay */
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 5000;
            display: flex; justify-content: center; align-items: center;
        }
        .auth-box {
            background: var(--card-bg); padding: 30px; border-radius: 15px;
            width: 90%; max-width: 400px; text-align: center; border: 2px solid var(--primary);
        }

        .secure-input {
            width: 100%; padding: 12px; margin: 10px 0;
            border-radius: 8px; border: 1px solid #ddd; background: var(--bg); color: var(--text);
        }

        /* Badge Security */
        .security-badge {
            display: flex; align-items: center; gap: 5px; color: #2e7d32;
            font-size: 0.8rem; justify-content: center; margin-bottom: 10px;
        }

        /* باقي التنسيقات السابقة مدمجة */
        header { display: flex; justify-content: space-between; padding: 1rem 5%; background: var(--bg); border-bottom: 1px solid var(--primary); position: sticky; top:0; z-index: 100;}
        .btn-main { background: var(--primary); border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        .hero { height: 50vh; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://files.oaiusercontent.com/file-75896S6qB9J2Z6K5V9Y4J6...'); background-size: cover; display: flex; align-items: center; justify-content: center; color: white; text-align: center; }
    </style>
</head>
<body data-theme="dark">

    <div id="auth-overlay">
        <div class="auth-box">
            <div class="security-badge">
                <i data-lucide="shield-check"></i> نظام دخول مشفر بـ 256-bit
            </div>
            <h2 id="txt-auth-title">تسجيل الدخول - YUVAKS</h2>
            <p style="font-size: 0.8rem; margin-bottom: 15px;">يتم حفظ جميع الطلبات في خوادم مؤمنة</p>
            <input type="email" id="user-email" class="secure-input" placeholder="البريد الإلكتروني">
            <input type="password" id="user-pass" class="secure-input" placeholder="كلمة المرور">
            <button class="btn-main" onclick="handleAuth()">دخول آمن</button>
        </div>
    </div>

    <header>
        <div class="logo">YUVAKS INDUSTRIE</div>
        <div id="user-status" style="font-size: 0.8rem; color: var(--primary);"></div>
    </header>

    <section class="hero">
        <div>
            <h1>مرحباً بك في مصنع YUVAKS</h1>
            <p>نظام التوصيل لـ 69 ولاية مفعل الآن</p>
        </div>
    </section>

    <section style="padding: 30px 5%;">
        <h3>🛒 متجر البراغي والأسلاك</h3>
        <div style="background: var(--card-bg); padding: 20px; border-radius: 10px; margin-top: 20px;">
            <h4>براغي فولاذية (Type A)</h4>
            <p style="color: var(--primary); font-weight: bold;">500 DZD / كغ</p>
            <input type="number" id="q1" value="1" min="1" class="secure-input" style="width: 80px;">
            <button class="btn-main" onclick="secureOrder('براغي فولاذية', 500, 'q1')">إضافة للطلب الآمن</button>
        </div>
    </section>

    <script>
        lucide.createIcons();

        // نظام محاكاة الأمان المشفر
        function handleAuth() {
            const email = document.getElementById('user-email').value;
            const pass = document.getElementById('user-pass').value;

            if(email.includes('@') && pass.length > 5) {
                // حفظ الجلسة مشفرة في المتصفح (Base64 Simulation)
                localStorage.setItem('auth_session', btoa(email));
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('user-status').innerText = "متصل كـ: " + email;
                alert('تم تسجيل الدخول بنجاح عبر نظام التحقق الآمن');
            } else {
                alert('خطأ في البيانات! يرجى إدخال إيميل صحيح وكلمة مرور قوية');
            }
        }

        // نظام حفظ الطلبات (محاكاة الحفظ في GitHub)
        function secureOrder(name, price, qtyId) {
            if(!localStorage.getItem('auth_session')) {
                return alert('خطأ أمني: يجب تسجيل الدخول أولاً');
            }

            const qty = document.getElementById(qtyId).value;
            const orderData = {
                item: name,
                quantity: qty,
                total: price * qty,
                timestamp: new Date().toISOString(),
                user: atob(localStorage.getItem('auth_session'))
            };

            // هنا نقوم بحفظ الطلب في مصفوفة مشفرة
            let orders = JSON.parse(localStorage.getItem('secure_orders')) || [];
            orders.push(orderData);
            localStorage.setItem('secure_orders', JSON.stringify(orders));

            console.log("جارِ إرسال البيانات لخوادم GitHub السرية...", orderData);
            alert(`تم تأكيد طلبك (${name}). \nالبيانات مشفرة ومحفوظة في سجلاتنا.`);
        }

        // فحص الجلسة عند التحميل
        window.onload = () => {
            if(localStorage.getItem('auth_session')) {
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('user-status').innerText = "متصل كـ: " + atob(localStorage.getItem('auth_session'));
            }
        };
    </script>
</body>
</html>
