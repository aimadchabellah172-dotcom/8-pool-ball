<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8" />
<title>بلياردو واقعي متقدم</title>
<style>
body{margin:0;overflow:hidden;background:radial-gradient(#0b5a3f,#061f16);font-family:Arial}
canvas{display:block}
#ui{
position:fixed;top:10px;left:10px;
background:rgba(0,0,0,0.5);
color:#fff;padding:10px;border-radius:10px;
font-size:14px
}
</style>
</head>
<body>
<div id="ui">🎱 بلياردو واقعي - اسحب لتحديد القوة والاتجاه</div>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c');
const ctx=c.getContext('2d');
c.width=innerWidth;c.height=innerHeight;

const BALL_R=14;
const FRICTION=0.985;
const RESTITUTION=0.92;

// الجيوب
const pockets=[
{x:0,y:0},{x:c.width/2,y:0},{x:c.width,y:0},
{x:0,y:c.height},{x:c.width/2,y:c.height},{x:c.width,y:c.height}
];

class Ball{
  constructor(x,y,color,id){
    this.x=x;this.y=y;
    this.vx=0;this.vy=0;
    this.r=BALL_R;
    this.color=color;
    this.id=id;
    this.inPocket=false;
  }

  draw(){
    if(this.inPocket) return;

    ctx.beginPath();
    ctx.fillStyle=this.color;
    ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.fill();

    // رقم الكرة
    ctx.fillStyle="#000";
    ctx.font="12px Arial";
    ctx.textAlign="center";
    ctx.textBaseline="middle";
    ctx.fillText(this.id,this.x,this.y);
  }

  update(){
    if(this.inPocket) return;

    this.x+=this.vx;
    this.y+=this.vy;

    this.vx*=FRICTION;
    this.vy*=FRICTION;

    // الجدران (بدون ارتداد في الجيوب)
    if(this.x<this.r){this.x=this.r;this.vx*=-RESTITUTION;}
    if(this.x>c.width-this.r){this.x=c.width-this.r;this.vx*=-RESTITUTION;}
    if(this.y<this.r){this.y=this.r;this.vy*=-RESTITUTION;}
    if(this.y>c.height-this.r){this.y=c.height-this.r;this.vy*=-RESTITUTION;}

    // الجيوب
    for(let p of pockets){
      let dx=this.x-p.x;
      let dy=this.y-p.y;
      if(Math.hypot(dx,dy)<30){
        this.inPocket=true;
        this.vx=0;this.vy=0;
      }
    }
  }
}

let balls=[];

// كرة cue
let cue=new Ball(200,300,"#ffffff",0);
balls.push(cue);

// ترتيب مثلث
let id=1;
for(let i=0;i<5;i++){
  for(let j=0;j<=i;j++){
    balls.push(new Ball(600+i*28,300+j*28-(i*14),`hsl(${id*30},90%,55%)`,id));
    id++;
  }
}
