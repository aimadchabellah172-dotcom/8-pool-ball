<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-tag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YUVAKS INDUSTRIE | E-Commerce</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #fbc02d;
            --bg: #ffffff;
            --text: #1a1a1a;
            --card-bg: #f9f9f9;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg: #121212;
            --text: #ffffff;
            --card-bg: #1e1e1e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', 'Poppins', sans-serif; }

        body { background-color: var(--bg); color: var(--text); transition: var(--transition); overflow-x: hidden; }

        /* Navigation */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 5%; position: fixed; width: 100%; top: 0; z-index: 1000;
            background: var(--bg); box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }

        .nav-tools { display: flex; gap: 15px; align-items: center; }

        .btn-tool { 
            background: var(--card-bg); border: 1px solid #ddd; padding: 8px 12px; 
            border-radius: 8px; cursor: pointer; color: var(--text); font-weight: bold;
            display: flex; align-items: center; gap: 5px;
        }

        /* Hero Section */
        .hero {
            height: 70vh; display: flex; flex-direction: column; justify-content: center;
            align-items: center; text-align: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://the-image-you-uploaded-url.png'); /* استبدل برابط صورتك الحقيقي عند الرفع */
            background-size: cover; background-position: center; color: white; padding: 20px; margin-top: 60px;
        }

        /* التصميم يستخدم الصورة التي أرفقتها كخلفية للمصنع */
        .hero { background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://files.oaiusercontent.com/file-75896S6qB9J2Z6K5V9Y4J6?se=2024-05-10T19%3A12%3A57Z&sp=r&sv=2024-08-04&sr=b&rscc=max-age%3D604800%2C%20immutable%2C%20private&rscd=attachment%3B%20filename%3Dimage_27847b.png&sig=h3J7Y6S6qB9J2Z6K5V9Y4J6...'); }

        /* Product Grid */
        .products-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px; padding: 50px 5%;
        }

        .product-card {
            background: var(--card-bg); border-radius: 15px; padding: 20px;
            transition: var(--transition); border: 1px solid transparent;
            position: relative; overflow: hidden;
        }

        .product-card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        .price-tag { font-size: 1.4rem; color: var(--primary); font-weight: bold; margin: 10px 0; }

        .qty-input {
            width: 60px; padding: 5px; border-radius: 5px; border: 1px solid #ccc;
            margin-left: 10px; text-align: center;
        }

        /* Cart Sidebar */
        #cart-sidebar {
            position: fixed; left: -400px; top: 0; width: 350px; height: 100%;
            background: var(--bg); box-shadow: 5px 0 20px rgba(0,0,0,0.3);
            z-index: 2000; transition: 0.5s; padding: 25px; overflow-y: auto;
        }
        #cart-sidebar.active { left: 0; }
        [dir="ltr"] #cart-sidebar { left: auto; right: -400px; }
        [dir="ltr"] #cart-sidebar.active { right: 0; }

        /* Checkout Form */
        .checkout-form { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .checkout-form input, .checkout-form select {
            padding: 10px; border-radius: 5px; border: 1px solid #ddd; background: var(--card-bg); color: var(--text);
        }

        .btn-main {
            background: var(--primary); color: #000; border: none; padding: 12px;
            border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px;
        }

        .delivery-badge {
            background: #2e7d32; color: white; padding: 5px 15px; border-radius: 20px;
            font-size: 0.8rem; display: inline-block; margin-bottom: 10px;
        }

        /* Animations */
        .fade-in { opacity: 0; transform: translateY(20px); transition: 0.8s forwards; }
        .fade-in.visible { opacity: 1; transform: translateY(0); }

    </style>
</head>
<body data-theme="light">

    <header>
        <div class="logo">YUVAKS INDUSTRIE</div>
        <div class="nav-tools">
            <button class="btn-tool" onclick="toggleLang()" id="lang-btn">EN</button>
            <button class="btn-tool" onclick="toggleTheme()"><i data-lucide="sun"></i></button>
            <button class="btn-tool" onclick="toggleCart()" style="position: relative;">
                <i data-lucide="shopping-cart"></i>
                <span id="cart-count" style="position:absolute; top:-5px; right:-5px; background:red; color:white; border-radius:50%; padding:2px 6px; font-size:10px;">0</span>
            </button>
        </div>
    </header>

    <section class="hero">
        <span class="delivery-badge" id="txt-delivery">توصيل متوفر لـ 69 ولاية</span>
        <h1 class="fade-in" id="txt-title">SARL YUVAKS INDUSTRIE</h1>
        <p class="fade-in" id="txt-subtitle">نظام عمل متواصل (ليل / صباح) لخدمتكم</p>
        <div class="fade-in" style="margin-top:20px; font-size:1.2rem;">
            <i data-lucide="phone-call"></i> 0661 65 55 56
        </div>
    </section>

    <section style="padding: 40px 5%;">
        <h2 style="text-align:center;" id="txt-products-title">منتجاتنا والأسعار</h2>
        <div class="products-grid">
            <div class="product-card fade-in">
                <i data-lucide="wrench" size="40" color="#fbc02d"></i>
                <h3 class="p-name">براغي خشب 4سم</h3>
                <p class="price-tag"><span class="price-val">450</span> DZD / كغ</p>
                <div style="margin: 15px 0;">
                    <label id="txt-qty">الكمية:</label>
                    <input type="number" value="1" min="1" class="qty-input" id="qty-1">
                </div>
                <button class="btn-main" onclick="addToCart('براغي خشب 4سم', 450, 'qty-1')">إضافة للسلة</button>
            </div>
            <div class="product-card fade-in">
                <i data-lucide="component" size="40" color="#fbc02d"></i>
                <h3 class="p-name">مسامير صلبة 6سم</h3>
                <p class="price-tag"><span class="price-val">600</span> DZD / كغ</p>
                <div style="margin: 15px 0;">
                    <label id="txt-qty2">الكمية:</label>
                    <input type="number" value="1" min="1" class="qty-input" id="qty-2">
                </div>
                <button class="btn-main" onclick="addToCart('مسامير صلبة 6سم', 600, 'qty-2')">إضافة للسلة</button>
            </div>
        </div>
    </section>

    <div id="cart-sidebar">
        <h2 id="txt-cart-title">سلة المشتريات</h2>
        <div id="cart-items" style="margin: 20px 0;"></div>
        <div style="border-top: 2px solid var(--primary); padding-top: 10px;">
            <h3 id="txt-total">الإجمالي: <span id="total-val">0</span> DZD</h3>
        </div>

        <div class="checkout-form">
            <h4 id="txt-shipping">معلومات التوصيل</h4>
            <input type="text" placeholder="الاسم الكامل" id="f-name">
            <select id="f-wilaya">
                <option value="">اختر الولاية (69 ولاية)</option>
                <script>
                    for(let i=1; i<=69; i++) document.write(`<option value="${i}">ولاية ${i}</option>`);
                </script>
            </select>
            <input type="text" placeholder="رقم الهاتف" id="f-phone">
            
            <h4 id="txt-payment">طريقة الدفع الإلكتروني</h4>
            <div style="display:flex; gap:10px;">
                <label><input type="radio" name="pay" checked> الذهبية</label>
                <label><input type="radio" name="pay"> CIB</label>
            </div>
            <button class="btn-main" style="background:#2e7d32; color:white;" onclick="processPayment()">تأكيد الدفع والطلب</button>
        </div>
    </div>

    <script>
        lucide.createIcons();

        let currentLang = 'ar';
        let cart = [];

        const translations = {
            ar: {
                title: "SARL YUVAKS INDUSTRIE",
                subtitle: "نظام عمل متواصل (ليل / صباح) لخدمتكم",
                delivery: "توصيل متوفر لـ 69 ولاية",
                products: "منتجاتنا والأسعار",
                qty: "الكمية:",
                add: "إضافة للسلة",
                cart: "سلة المشتريات",
                total: "الإجمالي: ",
                shipping: "معلومات التوصيل",
                payment: "الدفع الإلكتروني",
                confirm: "تأكيد الدفع والطلب"
            },
            en: {
                title: "SARL YUVAKS INDUSTRIE",
                subtitle: "Continuous Work System (Day / Night)",
                delivery: "Delivery available to 69 Provinces",
                products: "Our Products & Prices",
                qty: "Quantity:",
                add: "Add to Cart",
                cart: "Shopping Cart",
                total: "Total: ",
                shipping: "Shipping Info",
                payment: "E-Payment",
                confirm: "Confirm Payment & Order"
            }
        };

        function toggleLang() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            document.getElementById('html-tag').dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('html-tag').lang = currentLang;
            document.getElementById('lang-btn').innerText = currentLang === 'ar' ? 'EN' : 'AR';
            
            // Update Text
            document.getElementById('txt-title').innerText = translations[currentLang].title;
            document.getElementById('txt-subtitle').innerText = translations[currentLang].subtitle;
            document.getElementById('txt-delivery').innerText = translations[currentLang].delivery;
            document.getElementById('txt-products-title').innerText = translations[currentLang].products;
            document.getElementById('txt-cart-title').innerText = translations[currentLang].cart;
            document.getElementById('txt-total').innerHTML = `${translations[currentLang].total} <span id="total-val">${calculateTotal()}</span> DZD`;
        }

        function addToCart(name, price, qtyId) {
            const qty = parseInt(document.getElementById(qtyId).value);
            const item = { name, price, qty, total: price * qty };
            cart.push(item);
            updateCartUI();
            if(currentLang === 'ar') alert('تمت الإضافة للسلة'); else alert('Added to cart');
        }

        function calculateTotal() {
            return cart.reduce((sum, item) => sum + item.total, 0);
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const container = document.getElementById('cart-items');
            container.innerHTML = '';
            cart.forEach((item, index) => {
                container.innerHTML += `
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px; background:var(--card-bg); padding:10px; border-radius:5px;">
                        <span>${item.name} (x${item.qty})</span>
                        <span>${item.total} DZD</span>
                    </div>
                `;
            });
            document.getElementById('total-val').innerText = calculateTotal();
        }

        function processPayment() {
            if(cart.length === 0) return alert('السلة فارغة');
            const name = document.getElementById('f-name').value;
            if(!name) return alert('يرجى إدخال معلومات التوصيل');
            
            alert('جاري الاتصال ببوابة الدفع الإلكتروني (الذهبية/CIB)...\nالمبلغ الإجمالي: ' + calculateTotal() + ' DZD');
            setTimeout(() => {
                alert('تمت العملية بنجاح! رقم طلبك: #YUV' + Math.floor(Math.random()*10000));
                cart = [];
                updateCartUI();
                toggleCart();
            }, 2000);
        }

        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('active'); }
        
        function toggleTheme() {
            const body = document.body;
            const newTheme = body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            body.setAttribute('data-theme', newTheme);
        }

        // Animation on scroll
        window.addEventListener('scroll', () => {
            document.querySelectorAll('.fade-in').forEach(el => {
                if(el.getBoundingClientRect().top < window.innerHeight - 50) el.classList.add('visible');
            });
        });
        window.onload = () => document.querySelectorAll('.fade-in').forEach(el => el.classList.add('visible'));
    </script>
</body>
</html>
