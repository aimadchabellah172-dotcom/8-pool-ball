<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Billiards Master Ultra HD</title>
    <style>
        body { 
            background: #05070a; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; color: white; font-family: 'Segoe UI', Arial; overflow: hidden; 
        }
        #gameWrapper { position: relative; padding: 20px; background: #1a1a1a; border-radius: 20px; box-shadow: 0 0 150px rgba(0,0,0,1); }
        canvas { border-radius: 10px; cursor: crosshair; }
        #powerUI {
            position: absolute; right: -50px; top: 100px; width: 25px; height: 250px;
            background: #111; border: 2px solid #333; border-radius: 12px; overflow: hidden;
        }
        #powerFill { width: 100%; position: absolute; bottom: 0; background: linear-gradient(to top, #ff0000, #ffea00, #00ff00); transition: 0.1s; }
    </style>
</head>
<body>

    <div id="gameWrapper">
        <canvas id="poolCanvas" width="940" height="490"></canvas>
        <div id="powerUI"><div id="powerFill" style="height: 0%"></div></div>
    </div>

<script>
const canvas = document.getElementById('poolCanvas');
const ctx = canvas.getContext('2d');

// الثوابت
const BALL_R = 13;
const POCKET_R = 28;
const FRICTION = 0.985;
const COLORS = ["#FFFFFF", "#FFD600", "#0D47A1", "#B71C1C", "#4A148C", "#E65100", "#1B5E20", "#4E342E", "#000000", "#FFEB3B", "#2196F3", "#F44336", "#9C27B0", "#FF9800", "#4CAF50", "#D32F2F"];

let balls = [];
let cueBall;
let isDragging = false;
let mouse = { x: 0, y: 0 };

class Ball {
    constructor(x, y, color, num, isCue = false) {
        this.x = x; this.y = y;
        this.vx = 0; this.vy = 0;
        this.color = color;
        this.num = num;
        this.isCue = isCue;
        this.inPocket = false;
    }

    draw() {
        if (this.inPocket) return;

        // ظل الكرة على القماش
        ctx.save();
        ctx.shadowBlur = 10; ctx.shadowColor = "rgba(0,0,0,0.6)";
        ctx.shadowOffsetX = 5; ctx.shadowOffsetY = 5;

        // الكرة 3D
        let grad = ctx.createRadialGradient(this.x - 4, this.y - 4, 1, this.x, this.y, BALL_R);
        grad.addColorStop(0, "#ffffff");
        grad.addColorStop(0.3, this.color);
        grad.addColorStop(1, "#000");

        ctx.beginPath();
        ctx.arc(this.x, this.y, BALL_R, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.restore();

        // الرقم
        if (!this.isCue) {
            ctx.beginPath();
            ctx.arc(this.x, this.y, BALL_R * 0.45, 0, Math.PI * 2);
            ctx.fillStyle = "white";
            ctx.fill();
            ctx.fillStyle = "black";
            ctx.font = "bold 9px Arial";
            ctx.textAlign = "center";
            ctx.fillText(this.num, this.x, this.y + 3);
        }
    }

    update() {
        if (this.inPocket) return;
        this.x += this.vx; this.y += this.vy;
        this.vx *= FRICTION; this.vy *= FRICTION;
        
        if (Math.hypot(this.vx, this.vy) < 0.1) { this.vx = 0; this.vy = 0; }

        // تصادم الحواف (مع مراعاة سمك الخشب 20px)
        const wall = 35; 
        if (this.x < wall + BALL_R || this.x > canvas.width - wall - BALL_R) {
            this.vx *= -0.7;
            this.x = this.x < wall + BALL_R ? wall + BALL_R : canvas.width - wall - BALL_R;
        }
        if (this.y < wall + BALL_R || this.y > canvas.height - wall - BALL_R) {
            this.vy *= -0.7;
            this.y = this.y < wall + BALL_R ? wall + BALL_R : canvas.height - wall - BALL_R;
        }
    }
}

function initTable() {
    balls = [];
    cueBall = new Ball(250, canvas.height/2, "#FFFFFF", 0, true);
    balls.push(cueBall);

    let count = 1;
    const startX = 650;
    for (let r = 0; r < 5; r++) {
        for (let i = 0; i <= r; i++) {
            balls.push(new Ball(startX + r*23, (canvas.height/2 - r*14) + i*28, COLORS[count], count));
            count++;
        }
    }
}

function drawTable() {
    // 1. الإطار الخشبي الخارجي
    ctx.fillStyle = "#3e2723";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 2. الحواف الداخلية (Cushions) بظل
    ctx.fillStyle = "#263238"; 
    ctx.fillRect(20, 20, canvas.width - 40, canvas.height - 40);

    // 3. القماش الأزرق الفاخر
    let clothGrad = ctx.createRadialGradient(470, 245, 100, 470, 245, 500);
    clothGrad.addColorStop(0, "#2a699c");
    clothGrad.addColorStop(1, "#1a4a70");
    ctx.fillStyle = clothGrad;
    ctx.fillRect(35, 35, canvas.width - 70, canvas.height - 70);

    // 4. الخط الأبيض
    ctx.strokeStyle = "rgba(255,255,255,0.2)";
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(250, 35); ctx.lineTo(250, 455); ctx.stroke();

    // 5. الفتحات (Pockets) - تم تحسين البرمجة لتكون في الزوايا بالضبط
    const holes = [
        [35, 35], [470, 25], [905, 35],
        [35, 455], [470, 465], [905, 455]
    ];
    ctx.shadowBlur = 15; ctx.shadowColor = "black";
    holes.forEach
