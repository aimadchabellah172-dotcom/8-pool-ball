<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>8 Ball Pool Clone - Pro Edition</title>
    <style>
        body { margin: 0; background: #0b0f1a; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Arial', sans-serif; overflow: hidden; }
        #table-wrapper { position: relative; border: 12px solid #3d2416; border-radius: 15px; box-shadow: 0 0 100px rgba(0,0,0,0.8); }
        canvas { background: #1e4b8a; display: block; cursor: none; }
        .power-bar { position: absolute; right: -50px; bottom: 20px; width: 25px; height: 250px; background: #111; border: 2px solid #5d3a24; border-radius: 5px; }
        #fill { position: absolute; bottom: 0; width: 100%; background: linear-gradient(to top, #ff0000, #ffff00, #00ff00); transition: height 0.05s; }
        .ui { width: 900px; display: flex; justify-content: space-between; color: white; padding: 10px; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

<div class="ui">
    <div>لاعب 1 <span style="color:#fbbf24">●</span></div>
    <div id="status">اسحب للتصويب</div>
    <div>الكمبيوتر <span style="color:#94a3b8">●</span></div>
</div>

<div id="table-wrapper">
    <div class="power-bar"><div id="fill" style="height: 0%"></div></div>
    <canvas id="poolCanvas"></canvas>
</div>

<script>
const canvas = document.getElementById('poolCanvas');
const ctx = canvas.getContext('2d');
const fill = document.getElementById('fill');

canvas.width = 900;
canvas.height = 450;

const BALL_R = 12;
const CUSHION_W = 20;

let balls = [];
let cueBall;
let isDragging = false;
let mouse = { x: 0, y: 0 };
let aimAngle = 0;
let dragPower = 0;

const colors = ["#fff", "#facc15", "#1d4ed8", "#dc2626", "#7c3aed", "#ea580c", "#16a34a", "#7f1d1d", "#000", "#fde047", "#60a5fa", "#f87171", "#a78bfa", "#fb923c", "#4ade80", "#b91c1c"];

class Ball {
    constructor(x, y, num, color) {
        this.x = x; this.y = y; this.num = num; this.color = color;
        this.vx = 0; this.vy = 0; this.inPocket = false;
    }
    draw() {
        if (this.inPocket) return;
        ctx.beginPath(); ctx.arc(this.x + 2, this.y + 2, BALL_R, 0, Math.PI*2);
        ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.fill();
        let g = ctx.createRadialGradient(this.x-4, this.y-4, 2, this.x, this.y, BALL_R);
        g.addColorStop(0, "#fff"); g.addColorStop(0.4, this.color); g.addColorStop(1, "#000");
        ctx.beginPath(); ctx.arc(this.x, this.y, BALL_R, 0, Math.PI*2); ctx.fillStyle = g; ctx.fill();
        if(this.num > 0) {
            ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(this.x, this.y, BALL_R/2, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "black"; ctx.font = "bold 9px Arial"; ctx.textAlign="center"; ctx.fillText(this.num, this.x, this.y+3);
        }
    }
    update() {
        if (this.inPocket) return;
        this.x += this.vx; this.y += this.vy;
        this.vx *= 0.985; this.vy *= 0.985;
        if(Math.hypot(this.vx, this.vy) < 0.1) { this.vx = 0; this.vy = 0; }

        // الفيزياء داخل الحواف
        const isXOpen = (this.y > 45 && this.y < 405);
        const isYOpen = (this.x > 45 && this.x < 430) || (this.x > 470 && this.x < 855);

        if(!isXOpen && (this.x < CUSHION_W || this.x > canvas.width - CUSHION_W)) {
             if (this.x < 10 || this.x > canvas.width - 10) this.inPocket = true;
        } else if (this.x < CUSHION_W || this.x > canvas.width - CUSHION_W) {
            this.vx *= -0.7; this.x = this.x < CUSHION_W ? CUSHION_W : canvas.width - CUSHION_W;
        }

        if(!isYOpen && (this.y < CUSHION_W || this.y > canvas.height - CUSHION_W)) {
             if (this.y < 10 || this.y > canvas.height - 10) this.inPocket = true;
        } else if (this.y < CUSHION_W || this.y > canvas.height - CUSHION_W) {
            this.vy *= -0.7; this.y = this.y < CUSHION_W ? CUSHION_W : canvas.height - CUSHION_W;
        }
        
        if (this.inPocket && this.num === 0) setTimeout(() => { this.inPocket=false; this.x=230; this.y=225; this.vx=0; this.vy=0; }, 500);
    }
}

function init() {
    balls = [];
    cueBall = new Ball(230, 225, 0, colors[0]);
    balls.push(cueBall);
    let n=1;
    for(let i=0; i<5; i++) {
        for(let j=0; j<=i; j++) {
            balls.push(new Ball(620 + i*22, 225 - (i*11) + j*23, n, colors[n]));
            n++;
        }
    }
}

function drawTable() {
    // اللباد
    ctx.fillStyle = "#1e4b8a"; ctx.fillRect(0,0,canvas.width,canvas.height);
    
    // الحفر السوداء العميقة
    ctx.fillStyle = "#050505";
    [[0,0], [450,0], [900,0], [0,450], [450,450], [900,450]].forEach(p => {
        ctx.beginPath(); ctx.arc(p[0], p[1], 32, 0, Math.PI*2); ctx.fill();
    });

    // الحواف (Cushions) بمسارات مقصوصة
    ctx.fillStyle = "#163a6e";
    // فوق
    ctx.beginPath(); ctx.moveTo(40,0); ctx.lineTo(435,0); ctx.lineTo(425,20); ctx.lineTo(50,20); ctx.fill();
    ctx.beginPath(); ctx.moveTo(465,0); ctx.lineTo(860,0); ctx.lineTo(850,20); ctx.lineTo(475,20); ctx.fill();
    // تحت
    ctx.beginPath(); ctx.moveTo(40,450); ctx.lineTo(435,450); ctx.lineTo(425,430); ctx.lineTo(50,430); ctx.fill();
    ctx.beginPath(); ctx.moveTo(465,450); ctx.lineTo(860,450); ctx.lineTo(850,430); ctx.lineTo(475,430); ctx.fill();
    // جوانب
    ctx.beginPath(); ctx.moveTo(0,40); ctx.lineTo(0,410); ctx.lineTo(20,400); ctx.lineTo(20,50); ctx.fill();
    ctx.beginPath(); ctx.moveTo(900,40); ctx.lineTo(900,410); ctx.lineTo(880,400); ctx.lineTo(880,50); ctx.fill();
}

function drawSystem() {
    if (cueBall.vx !== 0 || cueBall.vy !== 0) return;

    // 1. حساب الزاوية بناءً على الماوس (الهدف)
    aimAngle = Math.atan2(mouse.y - cueBall.y, mouse.x - cueBall.x);

    // 2. خط التصويب (الأبيض المتقطع)
    ctx.setLineDash([5, 5]);
    ctx.strokeStyle = "rgba(255,255,255,0.5)";
    ctx.beginPath(); ctx.moveTo(cueBall.x, cueBall.y);
    ctx.lineTo(cueBall.x + Math.cos(aimAngle)*400, cueBall.y + Math.sin(aimAngle)*400);
    ctx.stroke();
    ctx.setLineDash([]);

    // 3. العصا (تظهر في الجهة المقابلة للهدف)
    let stickOffset = isDragging ? dragPower * 2 : 0;
    ctx.save();
    ctx.translate(cueBall.x, cueBall.y);
    ctx.rotate(aimAngle + Math.PI); // عكس زاوية الهدف
    
    let grad = ctx.createLinearGradient(-20 - stickOffset, 0, -400 - stickOffset, 0);
    grad.addColorStop(0, "#fde047"); grad.addColorStop(0.1, "#452512"); grad.addColorStop(1, "#0a0a0a");
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.roundRect(-20 - stickOffset, -4, -380, 8, 4); ctx.fill();
    ctx.restore();
}

canvas.onmousedown = () => { if(cueBall.vx===0) isDragging = true; };
window.onmousemove = (e) => {
    const rect = canvas.getBoundingClientRect();
    mouse = { x: e.clientX - rect.left, y: e.clientY - rect.top };
    if(isDragging) {
        // حساب المسافة بين الماوس والكرة لتمثيل "السحب"
        let d = Math.min(Math.hypot(mouse.x - cueBall.x, mouse.y - cueBall.y), 200);
        dragPower = d / 5;
        fill.style.height = (d/200)*100 + "%";
    }
};
window.onmouseup = () => {
    if(isDragging) {
        cueBall.vx = Math.cos(aimAngle) * dragPower;
        cueBall.vy = Math.sin(aimAngle) * dragPower;
        isDragging = false; dragPower = 0; fill.style.height = "0%";
    }
};

function collide() {
    for(let i=0; i<balls.length; i++) {
        for(let j=i+1; j<balls.length; j++) {
            let b1=balls[i], b2=balls[j];
            if(b1.inPocket || b2.inPocket) continue;
            let d = Math.hypot(b2.x-b1.x, b2.y-b1.y);
            if(d < BALL_R*2) {
                let a = Math.atan2(b2.y-b1.y, b2.x-b1.x);
                let overlap = BALL_R*2 - d;
                b1.x -= Math.cos(a)*overlap/2; b1.y -= Math.sin(a)*overlap/2;
                b2.x += Math.cos(a)*overlap/2; b2.y += Math.sin(a)*overlap/2;
                let v1n = b1.vx*Math.cos(a) + b1.vy*Math.sin(a);
                let v2n = b2.vx*Math.cos(a) + b2.vy*Math.sin(a);
                b1.vx += (v2n-v1n)*Math.cos(a); b1.vy += (v2n-v1n)*Math.sin(a);
                b2.vx += (v1n-v2n)*Math.cos(a); b2.vy += (v1n-v2n)*Math.sin(a);
            }
        }
    }
}

function loop() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawTable();
    balls.forEach(b => { b.update(); b.draw(); });
    collide();
    drawSystem();
    requestAnimationFrame(loop);
}

init(); loop();
</script>
</body>
</html>
