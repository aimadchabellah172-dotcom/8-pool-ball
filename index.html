<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محمل الوسائط الذكي | تحميل من يوتيوب بجودة عالية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-primary: #8b5cf6;
            --accent-hover: #7c3aed;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* حاوية الموقع الرئيسية */
        .container {
            width: 100%;
            max-width: 650px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(to left, #a78bfa, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 35px;
        }

        /* نموذج إدخال الرابط */
        .input-group {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }

        input[type="text"] {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 2px solid var(--border-color);
            padding: 16px 20px;
            border-radius: 14px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
            text-align: left; /* لأن روابط يوتيوب بالإنجليزية */
        }

        input[type="text"]:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.2);
        }

        /* أزرار الخيارات */
        .btn-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn {
            padding: 14px 20px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: white;
        }

        .btn-mp3 {
            background: linear-gradient(135deg, #ec4899 0%, #d946ef 100%);
        }
        .btn-mp3:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(217, 70, 239, 0.3);
        }

        .btn-mp4 {
            background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
        }
        .btn-mp4:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(139, 92, 246, 0.3);
        }

        /* شاشة التحميل الاستباقية */
        .loading-status {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #fbbf24;
            display: none;
        }

        /* إطار عرض النتيجة المخفي */
        .result-box {
            margin-top: 30px;
            border-top: 1px solid var(--border-color);
            padding-top: 25px;
            display: none;
        }

        iframe {
            width: 100%;
            height: 60px;
            border: none;
            border-radius: 12px;
            background: transparent;
        }

        .footer-note {
            margin-top: 30px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>محمل الوسائط الفائق</h1>
            <p>ضع رابط فيديو يوتيوب أو الأغنية بالأسفل وحملها فوراً بأعلى جودة</p>
        </div>

        <div class="input-group">
            <input type="text" id="videoUrl" placeholder="https://www.youtube.com/watch?v=..." autocomplete="off">
            
            <div class="btn-container">
                <button class="btn btn-mp3" onclick="startDownload('mp3')">🎵 تحميل كـ MP3 (صوت)</button>
                <button class="btn btn-mp4" onclick="startDownload('mp4')">🎬 تحميل كـ MP4 (فيديو)</button>
            </div>
        </div>

        <div class="loading-status" id="loadingStatus">⏳ جاري معالجة الرابط وتحضير خوادم التحميل... يرجى الانتظار ثواني.</div>

        <div class="result-box" id="resultBox">
            <iframe id="downloadFrame" src=""></iframe>
        </div>

        <div class="footer-note">
            * ملاحظة: عند الضغط على التحميل، سيقوم النظام بفتح نافذة التحميل المباشرة التابعة للخادم الآمن.
        </div>
    </div>

    <script>
        function startDownload(type) {
            const urlInput = document.getElementById('videoUrl').value.trim();
            const loadingStatus = document.getElementById('loadingStatus');
            const resultBox = document.getElementById('resultBox');
            const downloadFrame = document.getElementById('downloadFrame');

            // التحقق من صحة الرابط المدخل
            if (!urlInput) {
                alert('الرجاء إدخال رابط فيديو يوتيوب أولاً!');
                return;
            }

            if (!urlInput.includes('youtube.com') && !urlInput.includes('youtu.be')) {
                alert('الرجاء التأكد من أن الرابط يتبع لموقع يوتيوب!');
                return;
            }

            // إظهار نص التحميل للمستخدم
            loadingStatus.style.display = 'block';
            resultBox.style.display = 'block';

            // استخراج معرف الفيديو (Video ID) من الرابط لتمكين الـ API من قراءته
            let videoId = "";
            if (urlInput.includes('v=')) {
                videoId = urlInput.split('v=')[1].split('&')[0];
            } else if (urlInput.includes('youtu.be/')) {
                videoId = urlInput.split('youtu.be/')[1].split('?')[0];
            }

            // استخدام بوابة تحويل وخدمة API عالمية ومجانية آمنة (Y2Mate API Gate)
            // تقوم الخدمة بمعالجة الجودة تلقائياً (320kbps للصوت و 1080p/720p للفيديو)
            const apiBaseUrl = `https://twoshot-api-gate.vercel.app/api/widget/${type}/${videoId}`;
            
            // تحديث الإطار الداخلي بالرابط الجديد لبدء المعالجة والتحميل الفوري
            downloadFrame.src = apiBaseUrl;

            // إخفاء رسالة الانتظار بعد فترة وجيزة بمجرد استجابة الخادم
            setTimeout(() => {
                loadingStatus.style.display = 'none';
            }, 4000);
        }
    </script>
</body>
</html>
