<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استوديو الإبداع الاحترافي الفائق v3</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Cairo:wght@400;700&family=El+Messiri&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0b0e;
            --sidebar-color: #121216;
            --accent-color: #6366f1;
            --accent-hover: #4f46e5;
            --text-color: #f3f4f6;
            --border-color: #24242d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', 'Segoe UI', Tahoma, sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* شريط الأدوات الجانبي المحسن */
        .sidebar {
            width: 360px;
            background-color: var(--sidebar-color);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 15px;
            gap: 12px;
            overflow-y: auto;
            box-shadow: -5px 0 25px rgba(0,0,0,0.7);
            z-index: 10;
        }

        h2 {
            font-size: 1.1rem;
            text-align: center;
            color: var(--accent-color);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 2px;
            font-weight: 800;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 0.78rem;
            color: #a1a1aa;
            font-weight: 600;
        }

        .row-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        /* مدخلات الألوان والتصميم */
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            background: none;
            transition: transform 0.2s;
            flex-shrink: 0;
        }

        input[type="color"]::-webkit-color-swatch {
            border: 2px solid var(--border-color);
            border-radius: 50%;
        }

        select, input[type="range"], input[type="text"] {
            width: 100%;
            background-color: #1a1a22;
            border: 1px solid var(--border-color);
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            outline: none;
            font-size: 0.8rem;
            transition: all 0.3s;
        }

        select:focus, input[type="text"]:focus {
            border-color: var(--accent-color);
        }

        /* شبكات الأزرار التفاعلية */
        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.8rem;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(99, 102, 241, 0.25);
        }

        .btn-secondary {
            background-color: #1e1e26;
            border: 1px solid var(--border-color);
        }
        .btn-secondary:hover {
            background-color: #2a2a35;
        }

        .btn-danger {
            background-color: #ef4444;
        }
        .btn-danger:hover {
            background-color: #dc2626;
        }

        .btn-tool.active {
            background-color: var(--accent-color);
            color: white;
        }

        /* تخصيص إدخال الملفات للاستيراد */
        .file-upload-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background-color: #1e1e26;
            border: 1px dashed var(--border-color);
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
            transition: all 0.2s;
        }
        .file-upload-label:hover {
            border-color: var(--accent-color);
            background-color: #252530;
        }
        #imageLoader {
            display: none;
        }

        /* قائمة الصفحات والمستندات */
        .pages-section {
            border-top: 1px solid var(--border-color);
            padding-top: 10px;
        }

        .pages-list {
            list-style: none;
            margin-top: 5px;
            max-height: 100px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .page-item {
            background-color: #181820;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            border: 1px solid transparent;
        }

        .page-item.active {
            border-color: var(--accent-color);
            background-color: rgba(99, 102, 241, 0.08);
        }

        .delete-page-btn {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
        }

        /* مساحة الكانفاس والعمل */
        .canvas-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            background-color: #0f0f13;
            padding: 20px;
        }

        .canvas-area.grid-active {
            background-image: radial-gradient(#24242d 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .canvas-container {
            background-color: white;
            box-shadow: 0 15px 45px rgba(0,0,0,0.65);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.15);
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        /* مؤشر الدائرة التفاعلي للفرشاة */
        .brush-preview {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 2px solid #ffffff;
            box-shadow: 0 0 5px rgba(0,0,0,0.4);
            position: absolute;
            pointer-events: none;
            transform: translate(-50%, -50%);
            display: none;
            z-index: 100;
        }

        /* حقل النص العائم المؤقت عند استخدام أداة الكتابة */
        #textInputTemp {
            position: absolute;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid var(--accent-color);
            color: black;
            font-size: 16px;
            padding: 4px 8px;
            border-radius: 4px;
            outline: none;
            display: none;
            z-index: 200;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>استوديو الإبداع v3</h2>

        <div class="control-group">
            <label>الألوان والمؤثرات التفاعلية</label>
            <div class="row-group">
                <input type="color" id="colorPicker" value="#6366f1">
                <button class="btn btn-secondary btn-tool" id="eyedropperBtn" title="القطارة (سحب اللون)">🧪 قطارة</button>
                <button class="btn btn-secondary btn-tool" id="bucketBtn" title="دلو التلوين لتعبئة المساحات">🪣 دلو تلوين</button>
            </div>
        </div>

        <div class="control-group">
            <label>أداة الرسم والأشكال الهندسية</label>
            <select id="brushType">
                <option value="solid">🖌️ فرشاة رسم عادية</option>
                <option value="watercolor">💧 ألوان مائية ناعمة</option>
                <option value="pencil">✏️ قلم رصاص خشن</option>
                <option value="line">📏 رسم خط مستقيم</option>
                <option value="rect">⬛ رسم مستطيل</option>
                <option value="circle">⚪ رسم دائرة</option>
                <option value="triangle">🔺 رسم مثلث</option>
                <option value="text">🔤 أداة كتابة نصوص</option>
                <option value="eraser">🧽 ممحاة دقيقة</option>
            </select>
        </div>

        <div id="textOptionsGroup" class="control-group" style="display: none;">
            <label>نوع خط الكتابة وحجمه</label>
            <select id="fontFamilySelect">
                <option value="Cairo" style="font-family: 'Cairo';">خط كايرو الحديث</option>
                <option value="Amiri" style="font-family: 'Amiri';">الخط الأميري الكلاسيكي</option>
                <option value="Tajawal" style="font-family: 'Tajawal';">خط تجول الأنيق</option>
                <option value="El Messiri" style="font-family: 'El Messiri';">خط المسيري الجميل</option>
                <option value="Arial">Arial (عالمي)</option>
                <option value="Courier New">Monospace (برمجي)</option>
            </select>
            <input type="text" id="textToDraw" placeholder="اكتب النص الذي تريد إضافته هنا..." value="رسام إبداعي">
        </div>

        <div class="control-group">
            <label>اختر لوحة شهيرة جاهزة للتلوين</label>
            <select id="templateSelect">
                <option value="none">--- ابدأ بلوحة بيضاء فارغة ---</option>
                <option value="monalisa">🖼️ لوحة الموناليزا الشهيرة</option>
                <option value="mandala">🌸 ماندالا تلوين دائرية</option>
                <option value="cat">🐱 قطة كرتونية لطيفة</option>
            </select>
        </div>

        <div class="control-group">
            <label>استيراد رسمة قديمة من جهازك</label>
            <label for="imageLoader" class="file-upload-label">
                📂 اختر صورة من الكمبيوتر
            </label>
            <input type="file" id="imageLoader">
        </div>

        <div class="control-group">
            <div class="row-group" style="justify-content: space-between;">
                <label>الحجم / العرض</label>
                <span id="widthVal" style="font-size:0.75rem; color:var(--accent-color);">12px</span>
            </div>
            <input type="range" id="lineWidth" min="1" max="80" value="12">
        </div>

        <div class="control-group">
            <div class="row-group" style="justify-content: space-between;">
                <label>الشفافية</label>
                <span id="opacityVal" style="font-size:0.75rem; color:var(--accent-color);">100%</span>
            </div>
            <input type="range" id="opacity" min="1" max="100" value="100">
        </div>

        <div class="control-group">
            <div class="row-group" style="justify-content: space-between;">
                <label>تظليل وعمق الحواف</label>
                <span id="shadowVal" style="font-size:0.75rem; color:var(--accent-color);">بدون تظليل</span>
            </div>
            <input type="range" id="shadowBlur" min="0" max="40" value="0">
        </div>

        <div class="btn-grid">
            <button class="btn btn-secondary" id="undoBtn">↪️ تراجع</button>
            <button class="btn btn-secondary" id="redoBtn">↩️ تقدم</button>
        </div>

        <div class="btn-grid">
            <button class="btn btn-secondary" id="toggleGridBtn">🌐 خطوط الشبكة</button>
            <button class="btn btn-danger" id="clearCanvas">🧹 مسح اللوحة</button>
        </div>

        <button class="btn" id="downloadImage">💾 حفظ اللوحة كمستند PNG</button>

        <div class="pages-section">
            <label style="color: white; font-weight: bold;">اللوحات الإضافية بالمشروع</label>
            <div class="control-group" style="margin-top: 5px; flex-direction: row; gap: 4px;">
                <input type="text" id="newPageName" placeholder="اسم اللوحة..." style="padding: 6px 10px;">
                <button class="btn" id="addPageBtn" style="padding: 6px 12px; font-size:1rem;">+</button>
            </div>
            <ul class="pages-list" id="pagesList"></ul>
        </div>
    </div>

    <div class="canvas-area grid-active" id="canvasArea">
        <div class="canvas-container" id="canvasContainer">
            <canvas id="paintCanvas" width="850" height="600"></canvas>
        </div>
    </div>

    <div class="brush-preview" id="brushPreview"></div>
    <input type="text" id="textInputTemp">

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const canvasArea = document.getElementById('canvasArea');
        const container = document.getElementById('canvasContainer');
        const colorPicker = document.getElementById('colorPicker');
        
        const eyedropperBtn = document.getElementById('eyedropperBtn');
        const bucketBtn = document.getElementById('bucketBtn');
        const brushType = document.getElementById('brushType');
        const textOptionsGroup = document.getElementById('textOptionsGroup');
        const fontFamilySelect = document.getElementById('fontFamilySelect');
        const textToDrawInput = document.getElementById('textToDraw');
        const templateSelect = document.getElementById('templateSelect');
        const imageLoader = document.getElementById('imageLoader');

        const opacityRange = document.getElementById('opacity');
        const opacityVal = document.getElementById('opacityVal');
        const shadowRange = document.getElementById('shadowBlur');
        const shadowVal = document.getElementById('shadowVal');
        const lineWidthRange = document.getElementById('lineWidth');
        const widthVal = document.getElementById('widthVal');
        
        const undoBtn = document.getElementById('undoBtn');
        const redoBtn = document.getElementById('redoBtn');
        const toggleGridBtn = document.getElementById('toggleGridBtn');
        const clearBtn = document.getElementById('clearCanvas');
        const downloadBtn = document.getElementById('downloadImage');
        const brushPreview = document.getElementById('brushPreview');
        const textInputTemp = document.getElementById('textInputTemp');

        const newPageNameInput = document.getElementById('newPageName');
        const addPageBtn = document.getElementById('addPageBtn');
        const pagesList = document.getElementById('pagesList');

        let isDrawing = false;
        let isEyedropperActive = false;
        let isBucketActive = false;
        let lastX = 0, lastY = 0;
        let startX = 0, startY = 0;

        // نظام التراجع والتقدم
        let undoStack = [];
        let redoStack = [];
        const maxHistory = 20;

        // إدارة الأوراق
        let pages = { "اللوحة الرئيسية": null };
        let currentPageName = "اللوحة الرئيسية";

        function clearCanvasToWhite() {
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        clearCanvasToWhite();
        saveState();
        pages["اللوحة الرئيسية"] = canvas.toDataURL();

        function saveState() {
            if (undoStack.length >= maxHistory) {
                undoStack.shift();
            }
            undoStack.push(canvas.toDataURL());
            redoStack = [];
        }

        // تراجع وإعادة
        undoBtn.addEventListener('click', () => {
            if (undoStack.length > 1) {
                redoStack.push(undoStack.pop());
                loadStateFromURL(undoStack[undoStack.length - 1]);
            }
        });

        redoBtn.addEventListener('click', () => {
            if (redoStack.length > 0) {
                const nextState = redoStack.pop();
                undoStack.push(nextState);
                loadStateFromURL(nextState);
            }
        });

        function loadStateFromURL(url) {
            const img = new Image();
            img.onload = function() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);
                pages[currentPageName] = canvas.toDataURL();
            };
            img.src = url;
        }

        // تفعيل وإيقاف أدوات المساعدة (الشبكة والقطارة والدلو)
        toggleGridBtn.addEventListener('click', () => {
            canvasArea.classList.toggle('grid-active');
            toggleGridBtn.classList.toggle('active');
        });

        eyedropperBtn.addEventListener('click', () => {
            isEyedropperActive = !isEyedropperActive;
            isBucketActive = false;
            eyedropperBtn.classList.toggle('active', isEyedropperActive);
            bucketBtn.classList.remove('active');
        });

        bucketBtn.addEventListener('click', () => {
            isBucketActive = !isBucketActive;
            isEyedropperActive = false;
            bucketBtn.classList.toggle('active', isBucketActive);
            eyedropperBtn.classList.remove('active');
        });

        brushType.addEventListener('change', () => {
            if (brushType.value === 'text') {
                textOptionsGroup.style.display = 'flex';
            } else {
                textOptionsGroup.style.display = 'none';
            }
            updateBrushPreview();
        });

        // ------------------ خوارزمية دلو التلوين (Flood Fill 4-Way) ------------------
        function floodFill(startX, startY, fillColor) {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const width = canvas.width;
            const height = canvas.height;

            const targetRed = fillColor.r;
            const targetGreen = fillColor.g;
            const targetBlue = fillColor.b;
            const targetAlpha = fillColor.a;

            const baseIndex = (startY * width + startX) * 4;
            const startRed = data[baseIndex];
            const startGreen = data[baseIndex + 1];
            const startBlue = data[baseIndex + 2];
            const startAlpha = data[baseIndex + 3];

            // إذا كان اللون المراد تلوينه هو نفس اللون المستهدف بالفعل، لا تفعل شيئاً لمنع التكرار اللانهائي
            if (Math.abs(startRed - targetRed) < 5 &&
                Math.abs(startGreen - targetGreen) < 5 &&
                Math.abs(startBlue - targetBlue) < 5 &&
                Math.abs(startAlpha - targetAlpha) < 5) {
                return;
            }

            const queue = [[startX, startY]];

            while (queue.length > 0) {
                const [x, y] = queue.pop();
                const idx = (y * width + x) * 4;

                if (x < 0 || x >= width || y < 0 || y >= height) continue;

                // مطابقة الألوان بدقة تقريبية لمنع توقف التلوين بسبب فروق الشفافية البسيطة
                if (Math.abs(data[idx] - startRed) < 30 &&
                    Math.abs(data[idx+1] - startGreen) < 30 &&
                    Math.abs(data[idx+2] - startBlue) < 30 &&
                    Math.abs(data[idx+3] - startAlpha) < 30) {
                    
                    data[idx] = targetRed;
                    data[idx+1] = targetGreen;
                    data[idx+2] = targetBlue;
                    data[idx+3] = targetAlpha;

                    queue.push([x + 1, y]);
                    queue.push([x - 1, y]);
                    queue.push([x, y + 1]);
                    queue.push([x, y - 1]);
                }
            }
            ctx.putImageData(imageData, 0, 0);
        }

        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return { r, g, b, a: 255 };
        }

        // ------------------ استيراد صورة قديمة من الكمبيوتر ------------------
        imageLoader.addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    // جعل التراجع والتقدم مسجلاً لهذه الخطوة
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    saveState();
                    pages[currentPageName] = canvas.toDataURL();
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(e.target.files[0]);
        });

        // ------------------ لوحات تلوين مخططة جاهزة ------------------
        templateSelect.addEventListener('change', () => {
            const val = templateSelect.value;
            if (val === 'none') return;

            clearCanvasToWhite();
            ctx.strokeStyle = '#222222';
            ctx.lineWidth = 2;

            if (val === 'monalisa') {
                // رسم خطوط مبسطة كروكي للوحة الموناليزا
                ctx.beginPath();
                // الرأس والوجه والشعر
                ctx.arc(425, 200, 70, 0, Math.PI * 2); 
                ctx.moveTo(355, 200); ctx.bezierCurveTo(340, 300, 370, 450, 350, 550);
                ctx.moveTo(495, 200); ctx.bezierCurveTo(510, 300, 480, 450, 500, 550);
                // العينين والأنف والابتسامة الشهيرة
                ctx.moveTo(400, 190); ctx.lineTo(415, 190);
                ctx.moveTo(435, 190); ctx.lineTo(450, 190);
                ctx.moveTo(425, 190); ctx.lineTo(425, 220); ctx.lineTo(415, 225);
                ctx.moveTo(410, 240); ctx.bezierCurveTo(420, 245, 430, 245, 440, 240);
                // اليدين والملابس
                ctx.moveTo(380, 260); ctx.bezierCurveTo(320, 350, 340, 450, 430, 480);
                ctx.moveTo(470, 260); ctx.bezierCurveTo(530, 350, 510, 450, 440, 480);
                ctx.stroke();
            } else if (val === 'mandala') {
                // تلوين ماندالا هندسية دائرية متناظرة
                ctx.beginPath();
                const cx = 425, cy = 300;
                ctx.arc(cx, cy, 180, 0, Math.PI * 2);
                ctx.arc(cx, cy, 120, 0, Math.PI * 2);
                ctx.arc(cx, cy, 60, 0, Math.PI * 2);
                for (let i = 0; i < 12; i++) {
                    let angle = (i * Math.PI) / 6;
                    ctx.moveTo(cx, cy);
                    ctx.lineTo(cx + Math.cos(angle) * 180, cy + Math.sin(angle) * 180);
                }
                ctx.stroke();
            } else if (val === 'cat') {
                // رسمة قطة كرتونية ظريفة وبسيطة للتلوين
                ctx.beginPath();
                ctx.arc(425, 320, 90, 0, Math.PI * 2); // الرأس
                // الآذان
                ctx.moveTo(350, 260); ctx.lineTo(330, 170); ctx.lineTo(390, 240);
                ctx.moveTo(500, 260); ctx.lineTo(520, 170); ctx.lineTo(460, 240);
                // العينين والشاربين
                ctx.moveTo(395, 300); ctx.arc(395, 300, 10, 0, Math.PI*2);
                ctx.moveTo(455, 300); ctx.arc(455, 300, 10, 0, Math.PI*2);
                ctx.moveTo(425, 325); ctx.lineTo(425, 335); // الأنف والفم
                ctx.moveTo(425, 335); ctx.bezierCurveTo(415, 345, 410, 335, 405, 335);
                ctx.moveTo(425, 335); ctx.bezierCurveTo(435, 345, 440, 335, 445, 335);
                ctx.stroke();
            }

            saveState();
            pages[currentPageName] = canvas.toDataURL();
            templateSelect.value = 'none'; // إعادة تعيين الاختيار
        });

        // ------------------ منطق وأدوات الرسم والأشكال ------------------
        function applyBrushSettings() {
            const color = colorPicker.value;
            const opacity = opacityRange.value / 100;
            const size = lineWidthRange.value;
            const shadow = shadowRange.value;

            ctx.lineWidth = size;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            const r = parseInt(color.slice(1, 3), 16);
            const g = parseInt(color.slice(3, 5), 16);
            const b = parseInt(color.slice(5, 7), 16);

            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;

            const tool = brushType.value;

            if (tool === 'eraser') {
                ctx.strokeStyle = '#ffffff';
                ctx.globalAlpha = 1.0;
            } else if (tool === 'solid' || tool === 'rect' || tool === 'circle' || tool === 'triangle' || tool === 'line') {
                ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${opacity})`;
                ctx.globalAlpha = 1.0;
                if (shadow > 0) {
                    ctx.shadowColor = `rgba(${r}, ${g}, ${b}, ${opacity})`;
                    ctx.shadowBlur = shadow;
                }
            } else if (tool === 'watercolor') {
                ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${opacity * 0.12})`;
                ctx.globalAlpha = 0.4;
                ctx.shadowColor = `rgba(${r}, ${g}, ${b}, ${opacity * 0.25})`;
                ctx.shadowBlur = size * 0.4;
            } else if (tool === 'pencil') {
                ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${opacity * 0.7})`;
                ctx.globalAlpha = 0.75;
                if (shadow > 0) {
                    ctx.shadowColor = `rgba(${r}, ${g}, ${b}, ${opacity * 0.4})`;
                    ctx.shadowBlur = shadow * 0.3;
                }
            }
        }

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = Math.round(e.clientX - rect.left);
            const y = Math.round(e.clientY - rect.top);

            // 1. قطارة الألوان
            if (isEyedropperActive) {
                const pixel = ctx.getImageData(x, y, 1, 1).data;
                colorPicker.value = "#" + ((1 << 24) + (pixel[0] << 16) + (pixel[1] << 8) + pixel[2]).toString(16).slice(1);
                updateBrushPreview();
                isEyedropperActive = false;
                eyedropperBtn.classList.remove('active');
                return;
            }

            // 2. دلو التلوين
            if (isBucketActive) {
                const fillColor = hexToRgb(colorPicker.value);
                floodFill(x, y, fillColor);
                saveState();
                pages[currentPageName] = canvas.toDataURL();
                isBucketActive = false;
                bucketBtn.classList.remove('active');
                return;
            }

            // 3. أداة كتابة النصوص
            if (brushType.value === 'text') {
                applyBrushSettings();
                ctx.font = `${lineWidthRange.value * 2}px ${fontFamilySelect.value}`;
                ctx.fillStyle = colorPicker.value;
                ctx.fillText(textToDrawInput.value, x, y);
                saveState();
                pages[currentPageName] = canvas.toDataURL();
                return;
            }

            isDrawing = true;
            [lastX, lastY] = [x, y];
            [startX, startY] = [x, y];

            if (['rect', 'circle', 'triangle', 'line'].includes(brushType.value)) {
                this.tempSnapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;

            const rect = canvas.getBoundingClientRect();
            const x = Math.round(e.clientX - rect.left);
            const y = Math.round(e.clientY - rect.top);

            const tool = brushType.value;

            if (['rect', 'circle', 'triangle', 'line'].includes(tool)) {
                ctx.putImageData(this.tempSnapshot, 0, 0);
                applyBrushSettings();
                ctx.beginPath();

                if (tool === 'rect') {
                    ctx.rect(startX, startY, x - startX, y - startY);
                } else if (tool === 'circle') {
                    let radius = Math.sqrt(Math.pow(x - startX, 2) + Math.pow(y - startY, 2));
                    ctx.arc(startX, startY, radius, 0, 2 * Math.PI);
                } else if (tool === 'triangle') {
                    ctx.moveTo(startX + (x - startX) / 2, startY);
                    ctx.lineTo(x, y);
                    ctx.lineTo(startX, y);
                    ctx.closePath();
                } else if (tool === 'line') {
                    ctx.moveTo(startX, startY);
                    ctx.lineTo(x, y);
                }
                ctx.stroke();
            } else if (tool !== 'text') {
                applyBrushSettings();
                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(x, y);
                ctx.stroke();
                [lastX, lastY] = [x, y];
            }
        });

        canvas.addEventListener('mouseup', () => {
            if (isDrawing) {
                isDrawing = false;
                saveState();
                pages[currentPageName] = canvas.toDataURL();
            }
        });

        canvas.addEventListener('mouseout', () => isDrawing = false);

        clearBtn.addEventListener('click', () => {
            if (confirm("هل تريد مسح اللوحة بالكامل؟")) {
                clearCanvasToWhite();
                saveState();
                pages[currentPageName] = canvas.toDataURL();
            }
        });

        downloadBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = `${currentPageName}.png`;
            link.href = canvas.toDataURL();
            link.click();
        });

        // ------------------ إدارة الصفحات المتعددة ------------------
        function renderPagesList() {
            pagesList.innerHTML = '';
            Object.keys(pages).forEach(name => {
                const li = document.createElement('li');
                li.className = `page-item ${name === currentPageName ? 'active' : ''}`;
                li.innerHTML = `
                    <span class="page-title">📄 ${name}</span>
                    ${name !== "اللوحة الرئيسية" ? `<button class="delete-page-btn" onclick="deletePage(event, '${name}')">🗑️</button>` : ''}
                `;
                li.addEventListener('click', () => switchPage(name));
                pagesList.appendChild(li);
            });
        }

        function switchPage(name) {
            if (name === currentPageName) return;

            pages[currentPageName] = canvas.toDataURL();

            container.style.transform = 'scale(0.95) rotateY(15deg)';
            container.style.opacity = '0.5';

            setTimeout(() => {
                currentPageName = name;
                const img = new Image();
                img.onload = function() {
                    clearCanvasToWhite();
                    ctx.drawImage(img, 0, 0);
                    undoStack = [canvas.toDataURL()];
                    redoStack = [];
                };
                img.src = pages[name] || canvas.toDataURL();
                renderPagesList();

                container.style.transform = 'scale(1) rotateY(0)';
                container.style.opacity = '1';
            }, 250);
        }

        addPageBtn.addEventListener('click', () => {
            const name = newPageNameInput.value.trim();
            if (!name) return alert("يرجى إدخال اسم اللوحة!");
            if (pages[name]) return alert("الاسم مستخدم بالفعل!");

            pages[currentPageName] = canvas.toDataURL();
            
            currentPageName = name;
            clearCanvasToWhite();
            pages[name] = canvas.toDataURL();

            undoStack = [canvas.toDataURL()];
            redoStack = [];

            newPageNameInput.value = '';
            renderPagesList();
        });

        window.deletePage = function(event, name) {
            event.stopPropagation();
            if (confirm(`حذف اللوحة: ${name}؟`)) {
                delete pages[name];
                if (currentPageName === name) {
                    switchPage("اللوحة الرئيسية");
                } else {
                    renderPagesList();
                }
            }
        };

        // تحديث واجهات المؤشرات المكتوبة
        opacityRange.addEventListener('input', () => { opacityVal.textContent = `${opacityRange.value}%`; });
        shadowRange.addEventListener('input', () => { shadowVal.textContent = shadowRange.value == 0 ? 'بدون تظليل' : `${shadowRange.value}px`; });
        lineWidthRange.addEventListener('input', () => {
            widthVal.textContent = `${lineWidthRange.value}px`;
            updateBrushPreview();
        });

        colorPicker.addEventListener('input', updateBrushPreview);

        function updateBrushPreview() {
            const size = lineWidthRange.value;
            brushPreview.style.width = `${size}px`;
            brushPreview.style.height = `${size}px`;
            brushPreview.style.backgroundColor = brushType.value === 'eraser' ? '#ffffff' : colorPicker.value;
        }

        canvas.addEventListener('mouseenter', () => brushPreview.style.display = 'block');
        canvas.addEventListener('mouseleave', () => brushPreview.style.display = 'none');
        canvas.addEventListener('mousemove', (e) => {
            brushPreview.style.left = `${e.clientX}px`;
            brushPreview.style.top = `${e.clientY}px`;
        });

        renderPagesList();
        updateBrushPreview();
    </script>
</body>
</html>
