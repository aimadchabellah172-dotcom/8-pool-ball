<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>أسطورة البيلياردو - Pro Pool JS</title>
    <style>
        body {
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: white;
            font-family: sans-serif;
        }
        canvas {
            border: 15px solid #5d3a1a;
            border-radius: 10px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            cursor: crosshair;
        }
        .ui { margin-top: 15px; text-align: center; }
    </style>
</head>
<body>

    <h2>بلياردو المحترفين (HTML5 Canvas)</h2>
    <canvas id="poolTable" width="800" height="400"></canvas>
    
    <div class="ui">
        <p>اسحب الماوس بعيداً عن الكرة البيضاء لتحديد القوة والاتجاه ثم أفلت</p>
        <button onclick="location.reload()">إعادة اللعبة</button>
    </div>

<script>
const canvas = document.getElementById('poolTable');
const ctx = canvas.getContext('2d');

// إعدادات اللعبة
const BALL_RADIUS = 12;
const POCKET_RADIUS = 25;
const FRICTION = 0.985; // احتكاك الطاولة (تباطؤ)
const WALL_BOUNCE = 0.7; // قوة الارتداد من الجدران

let balls = [];
let isDragging = false;
let mousePos = { x: 0, y: 0 };

class Ball {
    constructor(x, y, color, isCue = false) {
        this.x = x;
        this.y = y;
        this.vx = 0;
        this.vy = 0;
        this.radius = BALL_RADIUS;
        this.color = color;
        this.isCue = isCue;
    }

    draw() {
        // رسم ظل الكرة
        ctx.beginPath();
        ctx.arc(this.x + 3, this.y + 3, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(0,0,0,0.3)";
        ctx.fill();

        // رسم الكرة
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
        
        // لمعة الإضاءة لإعطاء مظهر 3D
        ctx.beginPath();
        ctx.arc(this.x - 4, this.y - 4, 3, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255,255,255,0.4)";
        ctx.fill();
        ctx.closePath();
    }

    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vx *= FRICTION;
        this.vy *= FRICTION;

        // توقف الكرة تماماً عند السرعات المنخفضة جداً
        if (Math.abs(this.vx) < 0.1) this.vx = 0;
        if (Math.abs(this.vy) < 0.1) this.vy = 0;

        // الارتداد من الجدران
        if (this.x + this.radius > canvas.width) { this.x = canvas.width - this.radius; this.vx *= -WALL_BOUNCE; }
        if (this.x - this.radius < 0) { this.x = this.radius; this.vx *= -WALL_BOUNCE; }
        if (this.y + this.radius > canvas.height) { this.y = canvas.height - this.radius; this.vy *= -WALL_BOUNCE; }
        if (this.y - this.radius < 0) { this.y = this.radius; this.vy *= -WALL_BOUNCE; }
    }
}

// إنشاء الكرات وترتيبها (مثلث)
function initGame() {
    balls = [];
    // الكرة البيضاء
    const cueBall = new Ball(200, canvas.height / 2, "#ffffff", true);
    balls.push(cueBall);

    // ترتيب كرات ملونة في مثلث
    const startX = 550;
    const startY = canvas.height / 2;
    let step = BALL_RADIUS * 2.2;
    
    for (let i = 0; i < 5; i++) {
        for (let j = 0; j <= i; j++) {
            let color = `hsl(${(i * 15 + j * 40) % 360}, 70%, 50%)`;
            if (i === 2 && j === 1) color = "#111"; // الكرة السوداء رقم 8
            balls.push(new Ball(startX + i * step, startY + (j * step) - (i * step / 2), color));
        }
    }
}

// معالجة التصادم بين كرتين بفيزياء حقيقية
function resolveCollision(b1, b2) {
    let dx = b2.x - b1.x;
    let dy = b2.y - b1.y;
    let distance = Math.sqrt(dx * dx + dy * dy);

    if (distance < b1.radius + b2.radius) {
        // منع التصاق الكرات
        let overlap = (b1.radius + b2.radius - distance) / 2;
        let nx = dx / distance; // المتجه الناظم x
        let ny = dy / distance; // المتجه الناظم y
        b1.x -= nx * overlap;
        b1.y -= ny * overlap;
        b2.x += nx * overlap;
        b2.y += ny * overlap;

        // تبادل الزخم (Momentum)
        let vRelative = (b1.vx - b2.vx) * nx + (b1.vy - b2.vy) * ny;
        if (vRelative > 0) {
            let impulse = (1.8 * vRelative) / 2; // 1.8 تعبر عن مرونة التصادم
            b1.vx -= impulse * nx;
            b1.vy -= impulse * ny;
            b2.vx += impulse * nx;
            b2.vy += impulse * ny;
        }
    }
}

// نظام الفتحات
function checkPockets() {
    const pockets = [
        {x: 0, y: 0}, {x: 400, y: 0}, {x: 800, y: 0},
        {x: 0, y: 400}, {x: 400, y: 400}, {x: 800, y: 400}
    ];

    balls = balls.filter(ball => {
        for (let p of pockets) {
            let d = Math.hypot(ball.x - p.x, ball.y - p.y);
            if (d < POCKET_RADIUS) {
                if (ball.isCue) {
                    // إعادة الكرة البيضاء إذا سقطت
                    ball.x = 200; ball.y = 200;
                    ball.vx = 0; ball.vy = 0;
                    return true;
                }
                return false; // حذف الكرة
            }
        }
        return true;
    });
}

// التحكم بالماوس
canvas.addEventListener('mousedown', (e) => {
    const cueBall = balls.find(b => b.isCue);
    if (cueBall.vx === 0 && cueBall.vy === 0) {
        isDragging = true;
    }
});

canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    mousePos = { x: e.clientX - rect.left, y: e.clientY - rect.top };
});

window.addEventListener('mouseup', () => {
    if (isDragging) {
        const cueBall = balls.find(b => b.isCue);
        let dx = cueBall.x - mousePos.x;
        let dy = cueBall.y - mousePos.y;
        cueBall.vx = dx * 0.15; // قوة الضربة
        cueBall.vy = dy * 0.15;
        isDragging = false;
    }
});

function gameLoop() {
    // رسم الطاولة
    ctx.fillStyle = "#2e7d32"; // لون القماش
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // رسم الفتحات
    ctx.fillStyle = "#000";
    [ {x: 0, y: 0}, {x: 400, y: 0}, {x: 800, y: 0},
      {x: 0, y: 400}, {x: 400, y: 400}, {x: 800, y: 400} ].forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, POCKET_RADIUS, 0, Math.PI * 2);
        ctx.fill();
    });

    // تحديث الكرات
    for (let i = 0; i < balls.length; i++) {
        for (let j = i + 1; j < balls.length; j++) {
            resolveCollision(balls[i], balls[j]);
        }
        balls[i].update();
        balls[i].draw();
    }

    checkPockets();

    // رسم خط المضرب عند التسديد
    if (isDragging) {
        const cueBall = balls.find(b => b.isCue);
        ctx.beginPath();
        ctx.moveTo(cueBall.x, cueBall.y);
        ctx.lineTo(mousePos.x, mousePos.y);
        ctx.strokeStyle = "rgba(255, 215, 0, 0.5)";
        ctx.lineWidth = 3;
        ctx.stroke();
    }

    requestAnimationFrame(gameLoop);
}

initGame();
gameLoop();
</script>
</body>
</html>
    </script>
</body>
</html>
