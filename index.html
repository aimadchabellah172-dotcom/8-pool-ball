<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8" />
<title>لعبة بلياردو متطورة</title>
<style>
body{margin:0;background:#0b3d2e;overflow:hidden;font-family:Arial}
canvas{display:block;margin:auto;background:#0a5a3c}
#ui{position:fixed;top:10px;left:10px;color:#fff}
</style>
</head>
<body>
<div id="ui">اسحب وحدد القوة - خط التصويب يظهر تلقائياً</div>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const FRICTION=0.985;
const BALL_R=14;

class Ball{
  constructor(x,y,color,id){
    this.x=x;this.y=y;
    this.vx=0;this.vy=0;
    this.ax=0;this.ay=0;
    this.r=BALL_R;
    this.color=color;
    this.id=id;
    this.spin=0;
  }
  draw(){
    ctx.save();
    ctx.translate(this.x,this.y);
    ctx.rotate(this.spin);
    ctx.beginPath();
    ctx.fillStyle=this.color;
    ctx.arc(0,0,this.r,0,Math.PI*2);
    ctx.fill();

    // خط دوران (spin indicator)
    ctx.beginPath();
    ctx.strokeStyle="#fff";
    ctx.moveTo(0,0);
    ctx.lineTo(this.r,0);
    ctx.stroke();

    ctx.restore();
  }
  update(){
    this.vx+=this.ax;
    this.vy+=this.ay;

    this.x+=this.vx;
    this.y+=this.vy;

    this.vx*=FRICTION;
    this.vy*=FRICTION;

    this.spin+=this.vx*0.02;

    // الجدران
    if(this.x<this.r||this.x>canvas.width-this.r){
      this.vx*=-1;
    }
    if(this.y<this.r||this.y>canvas.height-this.r){
      this.vy*=-1;
    }
  }
}

let balls=[];

// الكرة البيضاء
let cue=new Ball(200,200,"#ffffff",0);
balls.push(cue);

// ترتيب كرات
for(let i=0;i<10;i++){
  balls.push(new Ball(500+Math.random()*100,200+i*30,
  `hsl(${i*36},80%,50%)`,i+1));
}

let mouse={x:0,y:0,down:false};

canvas.addEventListener('mousemove',e=>{
  mouse.x=e.clientX;
  mouse.y=e.clientY;
});

canvas.addEventListener('mousedown',()=>mouse.down=true);
canvas.addEventListener('mouseup',()=>{
  mouse.down=false;

  // ضرب الكرة
  let dx=cue.x-mouse.x;
  let dy=cue.y-mouse.y;
  cue.vx=dx*0.15;
  cue.vy=dy*0.15;
});

function collide(a,b){
  let dx=b.x-a.x;
  let dy=b.y-a.y;
  let dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<a.r+b.r){
    let angle=Math.atan2(dy,dx);
    let force=0.5;
    a.vx-=Math.cos(angle)*force;
    a.vy-=Math.sin(angle)*force;
    b.vx+=Math.cos(angle)*force;
    b.vy+=Math.sin(angle)*force;
  }
}

function drawAim(){
  if(mouse.down){
    ctx.beginPath();
    ctx.strokeStyle="rgba(255,255,255,0.6)";
    ctx.moveTo(cue.x,cue.y);
    ctx.lineTo(mouse.x,mouse.y);
    ctx.stroke();
  }
}

function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawAim();

  for(let b of balls){
    b.update();
    b.draw();
  }

  for(let i=0;i<balls.length;i++){
    for(let j=i+1;j<balls.length;j++){
      collide(balls[i],balls[j]);
    }
  }

  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
