<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>AI محلي ذكي</title>

<style>
body {
    background: #0f172a;
    color: white;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container {
    width: 600px;
    background: #1e293b;
    border-radius: 15px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
.chat {
    height: 400px;
    overflow-y: auto;
    padding: 15px;
}
.msg {
    margin: 10px;
    padding: 10px;
    border-radius: 10px;
}
.user {background: #38bdf8; color:black; text-align:right;}
.bot {background: #334155;}
.input {
    display: flex;
}
input {
    flex:1;
    padding:10px;
    border:none;
}
button {
    padding:10px;
    background:#38bdf8;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
    <div class="chat" id="chat"></div>

    <div class="input">
        <button onclick="send()">إرسال</button>
        <input id="input" placeholder="اكتب هنا...">
    </div>
</div>

<script>

const chat = document.getElementById("chat");

function add(text, type){
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

// 🧠 قاعدة بيانات ضخمة
const brain = [
    {keys:["مرحبا","اهلا","السلام"], replies:["أهلاً 👋","مرحبا فيك 😄","نورت!"]},
    {keys:["كيف حالك"], replies:["أنا بخير 😎","تمام! وانت؟"]},
    {keys:["اسمك"], replies:["أنا ذكاء اصطناعي 🤖"]},
    {keys:["مين انت"], replies:["مساعدك الذكي 😏"]},
    {keys:["بايثون","برمجة"], replies:["البرمجة ممتعة 🔥","تحب أساعدك في كود؟"]},
    {keys:["لعبة","game"], replies:["تحب ألعاب؟ 🎮","أقدر أسويلك لعبة 😎"]},
    {keys:["ذكاء اصطناعي"], replies:["مجالي المفضل 😏"]},
    {keys:["شكرا"], replies:["العفو ❤️","أي وقت!"]},
    {keys:["وداعا","باي"], replies:["مع السلامة 👋","نشوفك قريب"]},
];

// 🧠 تحليل ذكي
function smartReply(input){
    input = input.toLowerCase();

    let bestScore = 0;
    let bestReplies = ["ما فهمت عليك 🤔"];

    for(let item of brain){
        let score = 0;

        for(let key of item.keys){
            if(input.includes(key)){
                score++;
            }
        }

        if(score > bestScore){
            bestScore = score;
            bestReplies = item.replies;
        }
    }

    return bestReplies[Math.floor(Math.random() * bestReplies.length)];
}

function send(){
    const input = document.getElementById("input");
    const text = input.value.trim();
    if(!text) return;

    add(text,"user");
    input.value = "";

    setTimeout(()=>{
        add(smartReply(text),"bot");
    },500);
}

document.getElementById("input").addEventListener("keypress", e=>{
    if(e.key === "Enter") send();
});

</script>

</body>
</html>
